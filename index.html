<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猛禽類調査野帳 - Professional Multi-Size</title>
    <style>
        /* 前回のスタイルを継承 */
        :root { --accent: #2563eb; --bg-panel: rgba(255, 255, 255, 0.9); --border: #e2e8f0; --text: #1e293b; }
        body { margin: 0; overflow: hidden; background: #f1f5f9; font-family: sans-serif; position: fixed; width: 100%; height: 100%; touch-action: none; }
        #toolbar { position: fixed; top: 20px; left: 20px; z-index: 1000; background: var(--bg-panel); backdrop-filter: blur(10px); padding: 16px; border-radius: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 220px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); transition: transform 0.3s; }
        #toolbar.hidden { transform: translateX(-280px); }
        #toggle-btn { position: fixed; top: 20px; left: 20px; z-index: 1001; width: 44px; height: 44px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .start-card { background: white; padding: 32px; border-radius: 20px; width: 90%; max-width: 420px; text-align: center; }
        .start-card h2 { margin-top: 0; color: var(--text); }
        .start-card input, .start-card select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid var(--border); border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .start-card .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .start-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        .section { display: flex; flex-direction: column; gap: 6px; }
        .section-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button { padding: 10px 8px; cursor: pointer; border: 1px solid var(--border); background: #fff; border-radius: 8px; font-size: 12px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 4px; }
        button.active { background: var(--accent); color: white; }
        #colorPicker { display: flex; flex-wrap: wrap; gap: 8px; }
        .color-btn { width: 26px; height: 26px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .color-btn.selected { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }
        canvas { display: block; background: transparent; cursor: crosshair; }
        .file-label { font-size: 11px; background: #f1f5f9; padding: 8px; border-radius: 8px; border: 1px dashed #cbd5e1; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="start-overlay">
    <div class="start-card">
        <h2>調査開始</h2>
        <input type="text" id="project-name-input" placeholder="業務名を入力">
        <div class="grid-2">
            <select id="paper-size">
                <option value="A3">用紙: A3</option>
                <option value="A4">用紙: A4</option>
            </select>
            <select id="paper-orient">
                <option value="LANDSCAPE">向き: 横</option>
                <option value="PORTRAIT">向き: 縦</option>
            </select>
        </div>
        <button onclick="startProject()">新規開始</button>
        <button onclick="document.getElementById('importFile').click()" style="background: #64748b;">既存ファイル読込</button>
        <div id="resume-area" style="display:none; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
            <button onclick="resumeLastSession()" style="background:#10b981;">直前の続きから再開</button>
        </div>
    </div>
</div>

<button id="toggle-btn" onclick="toggleToolbar()">☰</button>

<div id="toolbar">
    <div class="section">
        <div class="section-title">Project</div>
        <div class="btn-group">
            <button onclick="exportProjectJSON()">💾 保存</button>
            <button onclick="document.getElementById('importFile').click()">📂 開く</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProjectJSON(this)">
    </div>
    <div class="section">
        <div class="section-title">Basemap</div>
        <label class="file-label" for="mapInput">🗺️ 画像を選択</label>
        <input type="file" id="mapInput" accept="image/*" style="display:none">
        <button onclick="resetView()">センター復帰</button>
    </div>
    <div class="section">
        <div class="section-title">Tools</div>
        <div class="btn-group">
            <button id="btn-draw" class="active" onclick="setMode('draw')">✏️ ペン</button>
            <button id="btn-erase" onclick="setMode('erase')">🧹 消しゴム</button>
            <button id="btn-window" onclick="setMode('window')">🖼️ 範囲</button>
            <button onclick="undo()">↩️ 戻る</button>
        </div>
    </div>
    <div class="section">
        <div class="section-title">Stamps</div>
        <div class="btn-group" style="grid-template-columns: 1fr 1fr 1fr;">
            <button id="btn-s1" onclick="setMode('stamp-circle')">〇</button>
            <button id="btn-s2" onclick="setMode('stamp-dot')">●</button>
            <button id="btn-s3" onclick="setMode('stamp-double')">◎</button>
        </div>
    </div>
    <div id="colorPicker"></div>
    <div class="section" style="margin-top:10px; border-top:1px solid var(--border); padding-top:10px;">
        <button onclick="exportDXF()" style="width:100%; margin-bottom:4px;">📐 DXF出力</button>
        <button onclick="exportGeoJSON()" style="width:100%; margin-bottom:4px;">🌍 GeoJSON</button>
        <button onclick="exportImageWithWindow()" style="width:100%; background:#eff6ff; color:var(--accent);">📸 PNG出力</button>
    </div>
</div>

<canvas id="viewport"></canvas>

<script>
// サイズ定数
const PAPER_CONFIG = {
    A3: { w: 1587, h: 1123 }, // 96dpi換算
    A4: { w: 1123, h: 794 }
};

let currentPaper = { w: 1587, h: 1123 }; // 初期値
let mapImage = new Image(), allPaths = [], currentPath = null;
let mode = 'draw', currentColor = '#ef4444', view = { x: 0, y: 0, scale: 0.5 };
let lastPointers = [], isPanning = false, needsRender = true, isVisible = true;
let windowStart = null, windowRect = null, projectName = "";
let currentMousePos = null, saveTimer = null;

const canvas = document.getElementById('viewport');
const ctx = canvas.getContext('2d');

function init() {
    window.addEventListener('resize', () => { resize(); requestRender(); });
    document.addEventListener('visibilitychange', () => { isVisible = !document.hidden; });
    resize();
    view.x = window.innerWidth / 2;
    view.y = window.innerHeight / 2;
    createColorButtons();
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    if(localStorage.getItem('field_note_autosave')) document.getElementById('resume-area').style.display = 'block';
    requestAnimationFrame(renderLoop);
}

function requestRender() { needsRender = true; }

function renderLoop() {
    if (isVisible && needsRender) { render(); needsRender = false; }
    requestAnimationFrame(renderLoop);
}

// 用紙設定の適用
function applyPaperSize(sizeKey, orient) {
    const base = PAPER_CONFIG[sizeKey] || PAPER_CONFIG.A3;
    if (orient === 'PORTRAIT') {
        currentPaper = { w: base.h, h: base.w };
    } else {
        currentPaper = { w: base.w, h: base.h };
    }
}

function startProject() {
    projectName = document.getElementById('project-name-input').value.trim();
    if (!projectName) return alert("業務名を入力してください");
    
    const sizeKey = document.getElementById('paper-size').value;
    const orient = document.getElementById('paper-orient').value;
    applyPaperSize(sizeKey, orient);
    
    document.getElementById('start-overlay').style.display = 'none';
    resetView();
}

function resumeLastSession() {
    try {
        const data = JSON.parse(localStorage.getItem('field_note_autosave'));
        allPaths = data.paths || [];
        projectName = data.projectName || "復元データ";
        // 保存データからサイズを復元（データにない場合はA3横）
        if (data.paperSize) {
            currentPaper = data.paperSize;
        } else {
            applyPaperSize('A3', 'LANDSCAPE');
        }
        mapImage = new Image();
        mapImage.onload = () => { resetView(); requestRender(); };
        mapImage.src = data.map || "";
        document.getElementById('start-overlay').style.display = 'none';
    } catch(e) { alert("復元に失敗しました"); }
}

function queueAutosave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
        try {
            const data = { projectName, paths: allPaths, map: mapImage.src, paperSize: currentPaper };
            localStorage.setItem('field_note_autosave', JSON.stringify(data));
        } catch(e) { console.warn("Autosave failed: Storage full"); }
    }, 1500); 
}

function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function toCanvas(sx, sy) {
    return { 
        x: (sx - view.x) / view.scale + currentPaper.w / 2, 
        y: (sy - view.y) / view.scale + currentPaper.h / 2 
    };
}

function drawCore(targetCtx, item, alpha = 1) {
    targetCtx.save();
    targetCtx.globalAlpha = alpha;
    targetCtx.strokeStyle = targetCtx.fillStyle = item.color;
    targetCtx.lineWidth = 2;
    targetCtx.lineCap = targetCtx.lineJoin = "round";
    if (item.type && item.type.startsWith('stamp')) {
        const r = 7;
        targetCtx.beginPath(); targetCtx.arc(item.x, item.y, r, 0, Math.PI*2);
        item.type === 'stamp-dot' ? targetCtx.fill() : targetCtx.stroke();
        if (item.type === 'stamp-double') { 
            targetCtx.beginPath(); targetCtx.arc(item.x, item.y, r*0.6, 0, Math.PI*2); targetCtx.stroke(); 
        }
    } else if (item.points && item.points.length > 0) {
        targetCtx.beginPath();
        targetCtx.moveTo(item.points[0].x, item.points[0].y);
        for(let i=1; i<item.points.length; i++) targetCtx.lineTo(item.points[i].x, item.points[i].y);
        targetCtx.stroke();
    }
    targetCtx.restore();
}

function render() {
    const dpr = window.devicePixelRatio || 1;
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = "#f1f5f9"; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.restore();

    ctx.save();
    ctx.translate(view.x, view.y); ctx.scale(view.scale, view.scale); ctx.translate(-currentPaper.w/2, -currentPaper.h/2);
    
    // 用紙描画
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, currentPaper.w, currentPaper.h);
    
    if (mapImage.complete && mapImage.naturalWidth > 0) {
        const s = Math.min(currentPaper.w/mapImage.naturalWidth, currentPaper.h/mapImage.naturalHeight);
        ctx.drawImage(mapImage, (currentPaper.w-mapImage.naturalWidth*s)/2, (currentPaper.h-mapImage.naturalHeight*s)/2, mapImage.naturalWidth*s, mapImage.naturalHeight*s);
    }
    allPaths.forEach(i => drawCore(ctx, i));
    if (currentPath) drawCore(ctx, currentPath);
    if (mode.startsWith('stamp') && currentMousePos && !isPanning) {
        const pt = toCanvas(currentMousePos.x, currentMousePos.y);
        drawCore(ctx, {type: mode, x: pt.x, y: pt.y, color: currentColor}, 0.5);
    }
    ctx.restore();

    if (mode === 'window' && windowRect) {
        ctx.save();
        ctx.translate(view.x, view.y); ctx.scale(view.scale, view.scale); ctx.translate(-currentPaper.w/2, -currentPaper.h/2);
        ctx.strokeStyle = "rgba(37, 99, 235, 0.8)"; ctx.lineWidth = 2/view.scale; ctx.setLineDash([5/view.scale, 5/view.scale]);
        ctx.strokeRect(windowRect.x, windowRect.y, windowRect.w, windowRect.h);
        ctx.restore();
    }
}

function exportImageWithWindow() {
    if (!windowRect) return alert("出力範囲を指定してください");
    const off = document.createElement('canvas');
    off.width = Math.round(windowRect.w); off.height = Math.round(windowRect.h);
    const octx = off.getContext('2d');
    octx.translate(-windowRect.x, -windowRect.y);
    octx.fillStyle = "#fff"; octx.fillRect(windowRect.x, windowRect.y, windowRect.w, windowRect.h);
    if (mapImage.complete) {
        const s = Math.min(currentPaper.w/mapImage.naturalWidth, currentPaper.h/mapImage.naturalHeight);
        octx.drawImage(mapImage, (currentPaper.w-mapImage.naturalWidth*s)/2, (currentPaper.h-mapImage.naturalHeight*s)/2, mapImage.naturalWidth*s, mapImage.naturalHeight*s);
    }
    allPaths.forEach(i => drawCore(octx, i));
    const a = document.createElement('a'); a.href = off.toDataURL("image/png");
    a.download = `${projectName}_${getFormattedDate()}.png`; a.click();
}

// 共通ポインタ処理
window.addEventListener('pointermove', e => {
    currentMousePos = { x: e.clientX, y: e.clientY };
    const idx = lastPointers.findIndex(p => p.pointerId === e.pointerId);
    if (idx !== -1) {
        const oldPointers = [...lastPointers];
        lastPointers[idx] = e;
        lastPointers.sort((a,b) => a.pointerId - b.pointerId);
        const pt = toCanvas(e.clientX, e.clientY);
        if (isPanning) {
            if (lastPointers.length >= 2) {
                const p1o = oldPointers[0], p2o = oldPointers[1], p1n = lastPointers[0], p2n = lastPointers[1];
                const do_ = Math.hypot(p1o.clientX - p2o.clientX, p1o.clientY - p2o.clientY);
                const dn = Math.hypot(p1n.clientX - p2n.clientX, p1n.clientY - p2n.clientY);
                if (do_ > 0) {
                    const ratio = dn / do_;
                    const mx = (p1n.clientX + p2n.clientX) / 2, my = (p1n.clientY + p2n.clientY) / 2;
                    view.x = mx - (mx - view.x) * ratio; view.y = my - (my - view.y) * ratio;
                    view.scale *= ratio;
                }
                view.x += ((p1n.clientX - p1o.clientX) + (p2n.clientX - p2o.clientX)) / 2;
                view.y += ((p1n.clientY - p1o.clientY) + (p2n.clientY - p2o.clientY)) / 2;
            } else {
                view.x += e.clientX - oldPointers[idx].clientX; view.y += e.clientY - oldPointers[idx].clientY;
            }
        } else if (mode === 'window' && windowStart) {
            windowRect = { x: Math.min(windowStart.x, pt.x), y: Math.min(windowStart.y, pt.y), w: Math.abs(pt.x - windowStart.x), h: Math.abs(pt.y - windowStart.y) };
        } else if (currentPath) {
            const last = currentPath.points[currentPath.points.length - 1];
            if (!last || Math.hypot(last.x - pt.x, last.y - pt.y) > 1.5) currentPath.points.push(pt);
        }
        requestRender();
    }
});

canvas.addEventListener('pointerdown', e => {
    lastPointers.push(e);
    const pt = toCanvas(e.clientX, e.clientY);
    if (e.button === 2 || lastPointers.length > 1) { isPanning = true; currentPath = null; return; }
    if (mode === 'window') { windowStart = pt; windowRect = null; return; }
    if (pt.x < 0 || pt.x > currentPaper.w || pt.y < 0 || pt.y > currentPaper.h) return;
    if (mode.startsWith('stamp')) { allPaths.push({type: mode, x: pt.x, y: pt.y, color: currentColor}); queueAutosave(); }
    else if (mode === 'draw') currentPath = {points: [pt], color: currentColor};
    else if (mode === 'erase') {
        allPaths = allPaths.filter(i => {
            const hit = i.points ? i.points.some(p => Math.hypot(p.x-pt.x, p.y-pt.y) < 20/view.scale) : Math.hypot(i.x-pt.x, i.y-pt.y) < 20/view.scale;
            return !hit;
        });
        queueAutosave();
    }
    requestRender();
});

function handlePointerUp(e) {
    lastPointers = lastPointers.filter(p => p.pointerId !== e.pointerId);
    if (lastPointers.length === 0) {
        if (currentPath) { allPaths.push(currentPath); currentPath = null; queueAutosave(); }
        isPanning = false; windowStart = null;
    }
    requestRender();
}
window.addEventListener('pointerup', handlePointerUp);
window.addEventListener('pointercancel', handlePointerUp);

canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    view.x = e.clientX - (e.clientX - view.x) * delta; view.y = e.clientY - (e.clientY - view.y) * delta;
    view.scale *= delta; requestRender();
}, { passive: false });

function undo() { if(allPaths.length > 0) { allPaths.pop(); queueAutosave(); requestRender(); } }
function toggleToolbar() { document.getElementById('toolbar').classList.toggle('hidden'); }

function setMode(m) {
    mode = m;
    const btns = { draw: 'btn-draw', erase: 'btn-erase', window: 'btn-window', 'stamp-circle': 'btn-s1', 'stamp-dot': 'btn-s2', 'stamp-double': 'btn-s3' };
    document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
    if (btns[m] && document.getElementById(btns[m])) document.getElementById(btns[m]).classList.add('active');
    requestRender();
}

function createColorButtons() {
    const cp = document.getElementById('colorPicker'); cp.innerHTML = '';
    ['#ef4444', '#3b82f6', '#a855f7', '#22c55e', '#f59e0b', '#0f172a'].forEach(c => {
        const b = document.createElement('div'); b.className = 'color-btn' + (c === currentColor ? ' selected' : '');
        b.style.background = c; b.onclick = () => { currentColor = c; createColorButtons(); requestRender(); };
        cp.appendChild(b);
    });
}

function resetView() { 
    const s = Math.min((window.innerWidth-100)/currentPaper.w, (window.innerHeight-100)/currentPaper.h); 
    view = { x: window.innerWidth/2, y: window.innerHeight/2, scale: s }; 
    requestRender(); 
}

function getFormattedDate() { const now = new Date(); return `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`; }

function exportProjectJSON() {
    const fileName = `${projectName}_${getFormattedDate()}.json`;
    const a = document.createElement('a'); 
    a.href = URL.createObjectURL(new Blob([JSON.stringify({map:mapImage.src, paths:allPaths, projectName, paperSize: currentPaper})], {type:\"application/json\"}));
    a.download = fileName; a.click();
}

function importProjectJSON(i) {
    const r = new FileReader();
    r.onload = e => {
        try {
            const d = JSON.parse(e.target.result);
            allPaths = d.paths || []; 
            projectName = d.projectName || "imported";
            currentPaper = d.paperSize || PAPER_CONFIG.A3; // 保存データから復元
            mapImage = new Image(); 
            mapImage.onload = () => { resetView(); requestRender(); }; 
            mapImage.src = d.map || "";
            document.getElementById('start-overlay').style.display = 'none';
        } catch(err) { alert("読込失敗"); }
    };
    if(i.files[0]) r.readAsText(i.files[0]);
}

function exportDXF() {
    const fileName = `${projectName}_${getFormattedDate()}.dxf`;
    let d = "  0\nSECTION\n  2\nENTITIES\n";
    allPaths.forEach(i => {
        if (i.points) {
            d += "  0\nPOLYLINE\n  8\n0\n 66\n 1\n 70\n 0\n";
            i.points.forEach(p => d += `  0\nVERTEX\n  8\n0\n 10\n${p.x}\n 20\n${-p.y}\n`);
            d += "  0\nSEQEND\n";
        } else if (i.type.startsWith('stamp')) {
            d += `  0\nCIRCLE\n  8\n0\n 10\n${i.x}\n 20\n${-i.y}\n 40\n7.0\n`;
            if (i.type === 'stamp-double') d += `  0\nCIRCLE\n  8\n0\n 10\n${i.x}\n 20\n${-i.y}\n 40\n4.2\n`;
        }
    });
    d += "  0\nENDSEC\n  0\nEOF";
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([d], {type: "application/dxf"})); a.download = fileName; a.click();
}

function exportGeoJSON() {
    const features = allPaths.map(item => ({
        type: "Feature",
        geometry: { 
            type: item.points ? "LineString" : "Point", 
            coordinates: item.points ? item.points.map(p => [p.x, -p.y]) : [item.x, -item.y] 
        },
        properties: { type: item.type, color: item.color }
    }));
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({type: "FeatureCollection", features})], {type: "application/json"}));
    a.download = `${projectName}_${getFormattedDate()}.geojson`; a.click();
}

document.getElementById('mapInput').onchange = e => {
    const r = new FileReader(); 
    r.onload = f => { 
        mapImage = new Image(); 
        mapImage.onload = () => { resetView(); requestRender(); }; 
        mapImage.src = f.target.result; 
    };
    if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
};

init();
</script>
</body>
</html>
