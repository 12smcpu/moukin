<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猛禽類調査野帳プロトタイプ V4</title>
    <style>
        :root { 
            --accent: #2563eb; 
            --bg-panel: rgba(255, 255, 255, 0.9);
            --border: #e2e8f0;
            --text: #1e293b;
        }
        body { 
            margin: 0; overflow: hidden; background: #f1f5f9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            position: fixed; width: 100%; height: 100%; touch-action: none; 
        }
        #toolbar { 
            position: fixed; top: 20px; left: 20px; z-index: 1000; 
            background: var(--bg-panel); backdrop-filter: blur(10px);
            padding: 16px; border-radius: 16px; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 220px; 
            max-height: 85vh; overflow-y: auto; border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #toolbar.hidden { transform: translateX(-260px); opacity: 0; }
        #toggle-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1001;
            width: 44px; height: 44px; background: var(--accent); color: white;
            border: none; border-radius: 12px; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            display: flex; align-items: center; justify-content: center;
        }
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .start-card {
            background: white; padding: 32px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .start-card h2 { margin-top: 0; color: var(--text); }
        .start-card input[type="text"] {
            width: 100%; padding: 12px; margin: 15px 0; border: 2px solid var(--border);
            border-radius: 8px; font-size: 16px; box-sizing: border-box;
        }
        .start-card button {
            width: 100%; padding: 12px; background: var(--accent); color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        .size-selector { text-align: left; margin: 15px 0; padding: 10px; background: #f8fafc; border-radius: 8px; }
        .size-selector label { display: block; margin: 8px 0; cursor: pointer; font-size: 14px; color: var(--text); }
        .section { display: flex; flex-direction: column; gap: 6px; }
        .section-title { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 2px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn-group.triple { grid-template-columns: 1fr 1fr 1fr; }
        button { 
            padding: 10px 8px; cursor: pointer; border: 1px solid var(--border); 
            background: #fff; border-radius: 8px; font-size: 12px; font-weight: 500;
            color: var(--text); transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        button:hover { background: #f8fafc; border-color: #cbd5e1; }
        button.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        #colorPicker { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0; }
        .color-btn { width: 26px; height: 26px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: transform 0.2s; }
        .color-btn.selected { transform: scale(1.2); border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }
        canvas { display: block; background: transparent; cursor: crosshair; }
        .file-label { font-size: 11px; background: #f1f5f9; padding: 8px; border-radius: 8px; border: 1px dashed #cbd5e1; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="start-overlay">
    <div class="start-card">
        <h2>調査開始</h2>
        <p style="color: #64748b; font-size: 14px;">新規プロジェクト名を入力</p>
        <input type="text" id="project-name-input" placeholder="例: 〇〇地区 猛禽類調査">
        
        <div class="size-selector">
            <p style="margin:0 0 8px 0; font-weight: bold; font-size: 12px; color: #64748b;">用紙サイズを選択</p>
            <label><input type="radio" name="paper-size" value="A3_LANDSCAPE" checked> A3横 (420x297mm)</label>
            <label><input type="radio" name="paper-size" value="A4_PORTRAIT"> A4縦 (210x297mm)</label>
        </div>

        <button onclick="startProject()">新規開始</button>
        <div style="margin: 15px 0; border-top: 1px solid #e2e8f0; padding-top: 15px;">
            <p style="color: #64748b; font-size: 14px;">または既存ファイルから再開</p>
            <button onclick="document.getElementById('importFile').click()" style="background: #64748b;">ファイルを選択</button>
        </div>
    </div>
</div>

<button id="toggle-btn" onclick="toggleToolbar()">☰</button>

<div id="toolbar">
    <div class="section">
        <div class="section-title">Project</div>
        <div class="btn-group">
            <button onclick="exportProjectJSON()">💾 保存</button>
            <button onclick="document.getElementById('importFile').click()">📂 開く</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProjectJSON(this)">
    </div>

    <div class="section">
        <div class="section-title">Basemap</div>
        <label class="file-label" for="mapInput">🗺️ 画像を選択</label>
        <input type="file" id="mapInput" accept="image/*" style="display:none">
        <button onclick="resetView()" style="margin-top:4px;">センター復帰</button>
    </div>

    <div class="section">
        <div class="section-title">Drawing Tools</div>
        <div class="btn-group triple">
            <button id="btn-draw" class="active" onclick="setMode('draw')">✏️ メモ</button>
            <button id="btn-arrow" onclick="setMode('arrow')">↗️ 矢印</button>
            <button id="btn-erase" onclick="setMode('erase')">🧹 消去</button>
        </div>
        <div class="btn-group">
            <button id="btn-window" onclick="setMode('window')">🖼️ 印刷窓</button>
            <button onclick="undo()">↩️ 戻る</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Analysis Stamps</div>
        <div class="btn-group triple">
            <button id="btn-s1" onclick="setMode('stamp-circle')">〇</button>
            <button id="btn-s2" onclick="setMode('stamp-dot')">●</button>
            <button id="btn-s3" onclick="setMode('stamp-double')">◎</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Color</div>
        <div id="colorPicker"></div>
    </div>

    <div class="section" style="margin-top: 10px; border-top: 1px solid var(--border); padding-top: 15px;">
        <button onclick="exportDXF()" style="width:100%; margin-bottom:6px;">📐 AutoCAD用 (DXF)</button>
        <button onclick="exportGeoJSON()" style="width:100%; margin-bottom:6px; background:#f0fdf4; color:#166534; border-color:#bbf7d0;">🌍 QGIS用 (GeoJSON)</button>
        <button onclick="exportImageWithWindow()" style="width:100%; background:#eff6ff; color:var(--accent); border-color:#bfdbfe;">📸 高画質PNG出力</button>
    </div>
</div>

<canvas id="viewport"></canvas>

<script>
const SIZES = {
    A3_LANDSCAPE: { w: 1587, h: 1123 }, // 72dpi相当
    A4_PORTRAIT:  { w: 842,  h: 1191 }
};

let currentSize = SIZES.A3_LANDSCAPE;
const canvas = document.getElementById('viewport');
const ctx = canvas.getContext('2d');
let mapImage = new Image(), allPaths = [], currentPath = null;
let mode = 'draw', currentColor = '#ef4444', view = { x: 0, y: 0, scale: 0.5 };
let lastPointers = [], isPanning = false;
let windowStart = null, windowRect = null;
let projectName = ""; 
let currentMousePos = null;

function init() {
    window.addEventListener('resize', resize);
    resize();
    view.x = window.innerWidth / 2;
    view.y = window.innerHeight / 2;
    createColorButtons();
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    render();
}

function startProject() {
    const input = document.getElementById('project-name-input');
    if (!input.value.trim()) { alert("業務名を入力してください。"); return; }
    const selectedSizeKey = document.querySelector('input[name="paper-size"]:checked').value;
    currentSize = SIZES[selectedSizeKey];
    projectName = input.value.trim();
    document.getElementById('start-overlay').style.display = 'none';
    resetView();
}

function getFormattedDate() {
    const now = new Date();
    return `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
}

function exportProjectJSON() {
    const data = { map: mapImage.src, paths: allPaths, projectName: projectName, currentSize: currentSize };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type:"application/json"}));
    a.download = `${projectName}_${getFormattedDate()}.json`;
    a.click();
}

function exportDXF() {
    const fileName = `${projectName}_${getFormattedDate()}.dxf`;
    const w = currentSize.w, h = currentSize.h;
    
    let d = "  0\nSECTION\n  2\nHEADER\n  9\n$ACADVER\n  1\nAC1009\n";
    d += `  9\n$EXTMIN\n 10\n0.0\n 20\n${-h}\n  9\n$EXTMAX\n 10\n${w}\n 20\n0.0\n`;
    d += "  0\nENDSEC\n  0\nSECTION\n  2\nENTITIES\n";

    // 用紙枠の自動生成
    d += `  0\nPOLYLINE\n  8\nPaper_Outline\n 66\n 1\n`;
    [[0,0],[w,0],[w,h],[0,h],[0,0]].forEach(p => d += `  0\nVERTEX\n  8\nPaper_Outline\n 10\n${p[0]}\n 20\n${-p[1]}\n`);
    d += "  0\nSEQEND\n";

    // 描画データの出力
    allPaths.forEach(i => {
        const layer = (i.type === 'arrow') ? "Arrows" : "Survey_Notes";
        if (i.points && i.points.length > 1) {
            d += `  0\nPOLYLINE\n  8\n${layer}\n 66\n 1\n`;
            i.points.forEach(p => d += `  0\nVERTEX\n  8\n${layer}\n 10\n${p.x}\n 20\n${-p.y}\n`);
            d += "  0\nSEQEND\n";
        } else if (i.type && i.type.startsWith('stamp')) {
            const r = 7.0;
            d += `  0\nCIRCLE\n  8\nStamps\n 10\n${i.x}\n 20\n${-i.y}\n 40\n${r}\n`;
            if (i.type === 'stamp-double') d += `  0\nCIRCLE\n  8\nStamps\n 10\n${i.x}\n 20\n${-i.y}\n 40\n${r*0.6}\n`;
        }
    });
    d += "  0\nENDSEC\n  0\nEOF";
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([d.replace(/\\n/g, '\n')], {type: "application/dxf"}));
    a.download = fileName; a.click();
}

function exportGeoJSON() {
    const features = allPaths.map(item => ({
        type: "Feature",
        geometry: {
            type: item.points ? "LineString" : "Point",
            coordinates: item.points ? item.points.map(p => [p.x, -p.y]) : [item.x, -item.y]
        },
        properties: { type: item.type, color: item.color }
    }));
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify({type: "FeatureCollection", features: features})], {type: "application/json"}));
    a.download = `${projectName}_${getFormattedDate()}.geojson`;
    a.click();
}

function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px'; canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    render();
}

function toCanvas(sx, sy) {
    return { x: (sx - view.x) / view.scale + currentSize.w / 2, y: (sy - view.y) / view.scale + currentSize.h / 2 };
}

function fromCanvas(cx, cy) {
    return { x: (cx - currentSize.w / 2) * view.scale + view.x, y: (cy - currentSize.h / 2) * view.scale + view.y };
}

function renderOnCtx(targetCtx, w, h, isExport = false) {
    targetCtx.fillStyle = "#fff"; targetCtx.fillRect(0, 0, w, h);
    if (mapImage.complete && mapImage.naturalWidth > 0) {
        const s = Math.min(w/mapImage.naturalWidth, h/mapImage.naturalHeight);
        targetCtx.drawImage(mapImage, (w-mapImage.naturalWidth*s)/2, (h-mapImage.naturalHeight*s)/2, mapImage.naturalWidth*s, mapImage.naturalHeight*s);
    }
    const drawItem = (item) => {
        targetCtx.save();
        targetCtx.strokeStyle = targetCtx.fillStyle = item.color;
        targetCtx.lineWidth = (item.type === 'draw') ? 1 : 2;
        if (item.type && item.type.startsWith('stamp')) {
            const r = 7; targetCtx.beginPath(); targetCtx.arc(item.x, item.y, r, 0, Math.PI*2);
            item.type === 'stamp-dot' ? targetCtx.fill() : targetCtx.stroke();
            if (item.type === 'stamp-double') { targetCtx.beginPath(); targetCtx.arc(item.x, item.y, r*0.6, 0, Math.PI*2); targetCtx.stroke(); }
        } else if (item.points && item.points.length > 0) {
            targetCtx.beginPath(); targetCtx.lineCap = targetCtx.lineJoin = "round";
            targetCtx.moveTo(item.points[0].x, item.points[0].y);
            item.points.forEach(p => targetCtx.lineTo(p.x, p.y)); targetCtx.stroke();
            if (item.type === 'arrow' && item.points.length >= 2) {
                const p2 = item.points[item.points.length-1], p1 = item.points[item.points.length-2];
                const angle = Math.atan2(p2.y-p1.y, p2.x-p1.x), head = 15;
                targetCtx.beginPath(); targetCtx.moveTo(p2.x,p2.y);
                targetCtx.lineTo(p2.x-head*Math.cos(angle-Math.PI/6), p2.y-head*Math.sin(angle-Math.PI/6));
                targetCtx.moveTo(p2.x,p2.y);
                targetCtx.lineTo(p2.x-head*Math.cos(angle+Math.PI/6), p2.y-head*Math.sin(angle+Math.PI/6));
                targetCtx.stroke();
            }
        }
        targetCtx.restore();
    };
    allPaths.forEach(i => drawItem(i));
    if (currentPath) drawItem(currentPath);
}

function render() {
    const dpr = window.devicePixelRatio || 1;
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = "#f1f5f9"; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.restore();

    ctx.save();
    ctx.translate(view.x, view.y);
    ctx.scale(view.scale, view.scale);
    ctx.translate(-currentSize.w/2, -currentSize.h/2);
    renderOnCtx(ctx, currentSize.w, currentSize.h);

    if (mode.startsWith('stamp') && currentMousePos && !isPanning) {
        const pt = toCanvas(currentMousePos.x, currentMousePos.y);
        ctx.globalAlpha = 0.5;
        const r = 7; ctx.strokeStyle = ctx.fillStyle = currentColor;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, r, 0, Math.PI*2);
        mode === 'stamp-dot' ? ctx.fill() : ctx.stroke();
        ctx.globalAlpha = 1.0;
    }
    if (windowRect) {
        ctx.save(); ctx.strokeStyle = "rgba(37, 99, 235, 0.8)"; ctx.lineWidth = 2/view.scale; ctx.setLineDash([5/view.scale, 5/view.scale]);
        ctx.strokeRect(windowRect.x, windowRect.y, windowRect.w, windowRect.h); ctx.restore();
    }
    ctx.restore();
}

window.addEventListener('pointermove', e => {
    currentMousePos = { x: e.clientX, y: e.clientY };
    const idx = lastPointers.findIndex(p => p.pointerId === e.pointerId);
    if (idx !== -1) {
        const oldPointers = [...lastPointers]; lastPointers[idx] = e;
        const pt = toCanvas(e.clientX, e.clientY);
        if (isPanning) {
            if (lastPointers.length >= 2) {
                const p1_o = oldPointers[0], p2_o = oldPointers[1], p1_n = lastPointers[0], p2_n = lastPointers[1];
                const dist_o = Math.hypot(p1_o.clientX - p2_o.clientX, p1_o.clientY - p2_o.clientY);
                const dist_n = Math.hypot(p1_n.clientX - p2_n.clientX, p1_n.clientY - p2_n.clientY);
                if (dist_o > 0) {
                    const ratio = dist_n / dist_o;
                    const mx = (p1_n.clientX + p2_n.clientX) / 2, my = (p1_n.clientY + p2_n.clientY) / 2;
                    view.x = mx - (mx - view.x) * ratio; view.y = my - (my - view.y) * ratio; view.scale *= ratio;
                }
                view.x += ((p1_n.clientX - p1_o.clientX) + (p2_n.clientX - p2_o.clientX)) / 2;
                view.y += ((p1_n.clientY - p1_o.clientY) + (p2_n.clientY - p2_o.clientY)) / 2;
            } else {
                view.x += e.clientX - oldPointers[idx].clientX; view.y += e.clientY - oldPointers[idx].clientY;
            }
        } else if (mode === 'window' && windowStart) {
            windowRect = { x: Math.min(windowStart.x, pt.x), y: Math.min(windowStart.y, pt.y), w: Math.abs(pt.x - windowStart.x), h: Math.abs(pt.y - windowStart.y) };
        } else if (currentPath) { currentPath.points.push(pt); }
    }
    render();
});

canvas.addEventListener('pointerdown', e => {
    lastPointers.push(e);
    const pt = toCanvas(e.clientX, e.clientY);
    if (e.button === 2 || lastPointers.length > 1) { isPanning = true; currentPath = null; return; }
    if (mode === 'window') { windowStart = pt; windowRect = null; return; }
    if (pt.x < 0 || pt.x > currentSize.w || pt.y < 0 || pt.y > currentSize.h) return;
    if (mode.startsWith('stamp')) { allPaths.push({type: mode, x: pt.x, y: pt.y, color: currentColor}); }
    else if (mode === 'draw' || mode === 'arrow') currentPath = {type: mode, points: [pt], color: currentColor};
    else if (mode === 'erase') {
        allPaths = allPaths.filter(i => {
            const dist = i.points ? i.points.some(p => Math.hypot(p.x-pt.x, p.y-pt.y) < 20/view.scale) : Math.hypot(i.x-pt.x, i.y-pt.y) < 20/view.scale;
            return !dist;
        });
    }
    render();
});

window.addEventListener('pointerup', e => {
    lastPointers = lastPointers.filter(p => p.pointerId !== e.pointerId);
    if (lastPointers.length === 0) { isPanning = false; windowStart = null; if (currentPath) { allPaths.push(currentPath); currentPath = null; } }
    render();
});

canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    view.x = e.clientX - (e.clientX - view.x) * delta; view.y = e.clientY - (e.clientY - view.y) * delta;
    view.scale *= delta; render();
}, { passive: false });

function toggleToolbar() { document.getElementById('toolbar').classList.toggle('hidden'); }
function setMode(m) { 
    mode = m;
    const btns = {draw:'btn-draw', arrow:'btn-arrow', erase:'btn-erase', 'stamp-circle':'btn-s1', 'stamp-dot':'btn-s2', 'stamp-double':'btn-s3', 'window':'btn-window'};
    Object.values(btns).forEach(id => { if(document.getElementById(id)) document.getElementById(id).className = ''; });
    if(btns[m]) document.getElementById(btns[m]).className = 'active';
}

function createColorButtons() {
    const cp = document.getElementById('colorPicker'); cp.innerHTML = '';
    ['#ef4444', '#3b82f6', '#a855f7', '#22c55e', '#f59e0b', '#0f172a'].forEach(c => {
        const b = document.createElement('div'); b.className = 'color-btn' + (c === currentColor ? ' selected' : '');
        b.style.background = c; b.onclick = () => { currentColor = c; createColorButtons(); };
        cp.appendChild(b);
    });
}

function resetView() {
    const s = Math.min((window.innerWidth-100)/currentSize.w, (window.innerHeight-100)/currentSize.h);
    view = { x: window.innerWidth/2, y: window.innerHeight/2, scale: s }; render();
}

function undo() { if(allPaths.length > 0) { allPaths.pop(); render(); } }

function exportImageWithWindow() {
    if (!windowRect) { alert("印刷窓を選択してください"); return; }
    
    // 高画質化のため、元データサイズ用のオフスクリーンキャンバスを作成
    const offCanvas = document.createElement('canvas');
    offCanvas.width = currentSize.w;
    offCanvas.height = currentSize.h;
    const offCtx = offCanvas.getContext('2d');
    
    // 地図と全パスを原寸大で一度レンダリング
    renderOnCtx(offCtx, currentSize.w, currentSize.h, true);
    
    // 印刷窓の範囲だけを切り出す
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = windowRect.w;
    exportCanvas.height = windowRect.h;
    const exportCtx = exportCanvas.getContext('2d');
    
    exportCtx.drawImage(offCanvas, windowRect.x, windowRect.y, windowRect.w, windowRect.h, 0, 0, windowRect.w, windowRect.h);
    
    const a = document.createElement('a');
    a.href = exportCanvas.toDataURL("image/png");
    a.download = `${projectName}_highres.png`;
    a.click();
}

function importProjectJSON(i) {
    const r = new FileReader();
    r.onload = e => {
        try {
            const d = JSON.parse(e.target.result); 
            allPaths = d.paths || []; projectName = d.projectName || "復元";
            currentSize = d.currentSize || SIZES.A3_LANDSCAPE;
            mapImage = new Image(); mapImage.onload = () => { resetView(); render(); }; mapImage.src = d.map || "";
            document.getElementById('start-overlay').style.display = 'none';
        } catch(err) { alert("失敗"); }
    };
    if(i.files[0]) r.readAsText(i.files[0]);
}

document.getElementById('mapInput').onchange = e => {
    const r = new FileReader();
    r.onload = f => { mapImage = new Image(); mapImage.onload = resetView; mapImage.src = f.target.result; };
    if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
};

init();
</script>
</body>
</html>
