<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猛禽類調査野帳 - Standard Stable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --accent: #2563eb; --bg-panel: rgba(255, 255, 255, 0.9); --border: #e2e8f0; --text: #1e293b; }
        body { margin: 0; overflow: hidden; background: #f1f5f9; font-family: sans-serif; position: fixed; width: 100%; height: 100%; touch-action: none; }
        #toolbar { position: fixed; top: 15px; left: 15px; z-index: 1000; background: var(--bg-panel); backdrop-filter: blur(8px); padding: 12px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 180px; border: 1px solid var(--border); transition: 0.3s; }
        #toolbar.hidden { transform: translateX(-220px); }
        #toggle-btn { position: fixed; top: 15px; left: 15px; z-index: 1001; width: 40px; height: 40px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; color: white; }
        .start-card { background: white; padding: 25px; border-radius: 15px; width: 300px; color: #333; }
        button { padding: 8px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 5px; font-size: 13px; }
        button.active { background: var(--accent); color: white; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

<div id="start-overlay">
    <div class="start-card">
        <h3>新規調査開始</h3>
        <input type="text" id="project-name" placeholder="プロジェクト名" style="width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;">
        <select id="paper-size" style="width:100%; margin-bottom:15px; padding:8px;"><option value="A3">A3 (横)</option><option value="A4">A4 (横)</option></select>
        <button onclick="startApp()" style="width:100%; background:var(--accent); color:white;">開始</button>
    </div>
</div>

<button id="toggle-btn" onclick="document.getElementById('toolbar').classList.toggle('hidden')">☰</button>

<div id="toolbar">
    <button onclick="exportZip()" style="background:#10b981; color:white;">保存 (ZIP)</button>
    <button onclick="undo()">↩ 戻る</button>
    <button onclick="resetView()">位置リセット</button>
    <hr style="width:100%; border:0; border-top:1px solid #eee;">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
        <button id="btn-draw" class="active" onclick="setMode('draw')">ペン</button>
        <button id="btn-erase" onclick="setMode('erase')">消ゴム</button>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;">
        <button id="btn-s1" onclick="setMode('stamp-circle')">〇</button>
        <button id="btn-s2" onclick="setMode('stamp-dot')">●</button>
        <button id="btn-s3" onclick="setMode('stamp-double')">◎</button>
    </div>
    <input type="file" id="map-input" accept="image/*" style="font-size:10px;">
</div>

<canvas id="mainCanvas"></canvas>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const PAPER = { A3: {w: 1587, h: 1123}, A4: {w: 1123, h: 794} };
let config = { w: 1587, h: 1123 }, projectName = "";
let view = { x: 50, y: 50, scale: 0.5 };
let allPaths = [], currentPath = null;
let mode = 'draw', pointers = [], isPanning = false;
let mapImg = new Image(), mousePos = {x:0, y:0};

function init() {
    window.addEventListener('resize', resize);
    resize();
    render();
}

function resize() {
    canvas.width = window.innerWidth * window.devicePixelRatio;
    canvas.height = window.innerHeight * window.devicePixelRatio;
    render();
}

// 用紙座標への変換（最もシンプルな逆変換）
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left);
    const y = (e.clientY - rect.top);
    return {
        x: (x - view.x) / view.scale,
        y: (y - view.y) / view.scale
    };
}

function render() {
    const dpr = window.devicePixelRatio;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // リセット
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(view.x, view.y);
    ctx.scale(view.scale, view.scale);

    // 用紙
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, config.w, config.h);
    ctx.strokeStyle = "#ccc";
    ctx.strokeRect(0, 0, config.w, config.h);

    // 地図
    if (mapImg.src) {
        const s = Math.min(config.w/mapImg.naturalWidth, config.h/mapImg.naturalHeight);
        ctx.drawImage(mapImg, (config.w-mapImg.naturalWidth*s)/2, (config.h-mapImg.naturalHeight*s)/2, mapImg.naturalWidth*s, mapImg.naturalHeight*s);
    }

    // 描画
    allPaths.forEach(p => drawItem(ctx, p));
    if (currentPath) drawItem(ctx, currentPath);

    // ゴースト
    if (mode.startsWith('stamp') && !isPanning) {
        const pt = getPos({clientX: mousePos.x, clientY: mousePos.y});
        ctx.globalAlpha = 0.5;
        drawItem(ctx, {type: mode, x: pt.x, y: pt.y, color: "red"});
        ctx.globalAlpha = 1.0;
    }
    ctx.restore();
}

function drawItem(tCtx, item) {
    tCtx.beginPath();
    tCtx.strokeStyle = tCtx.fillStyle = item.color || "red";
    tCtx.lineWidth = 2;
    if (item.points) {
        tCtx.moveTo(item.points[0].x, item.points[0].y);
        item.points.forEach(pt => tCtx.lineTo(pt.x, pt.y));
        tCtx.stroke();
    } else {
        tCtx.arc(item.x, item.y, 7, 0, Math.PI*2);
        item.type === 'stamp-dot' ? tCtx.fill() : tCtx.stroke();
        if (item.type === 'stamp-double') {
            tCtx.beginPath(); tCtx.arc(item.x, item.y, 4, 0, Math.PI*2); tCtx.stroke();
        }
    }
}

// --- イベント ---
canvas.addEventListener('pointerdown', e => {
    pointers.push(e);
    const pt = getPos(e);
    if (e.button === 2 || pointers.length > 1) {
        isPanning = true;
        currentPath = null;
    } else if (mode === 'draw') {
        currentPath = { points: [pt], color: "red" };
    } else if (mode === 'erase') {
        allPaths = allPaths.filter(p => {
            const hit = p.points ? p.points.some(d => Math.hypot(d.x-pt.x, d.y-pt.y) < 15/view.scale) : Math.hypot(p.x-pt.x, p.y-pt.y) < 15/view.scale;
            return !hit;
        });
    }
    render();
});

window.addEventListener('pointermove', e => {
    mousePos = {x: e.clientX, y: e.clientY};
    const idx = pointers.findIndex(p => p.pointerId === e.pointerId);
    if (idx === -1) { render(); return; }
    
    const prev = pointers[idx];
    const pt = getPos(e);
    
    if (isPanning) {
        view.x += e.clientX - prev.clientX;
        view.y += e.clientY - prev.clientY;
    } else if (currentPath) {
        const last = currentPath.points[currentPath.points.length-1];
        if (Math.hypot(last.x - pt.x, last.y - pt.y) > 2) currentPath.points.push(pt);
    }
    pointers[idx] = e;
    render();
});

window.addEventListener('pointerup', e => {
    if (pointers.length === 1 && !isPanning && mode.startsWith('stamp')) {
        const pt = getPos(e);
        allPaths.push({type: mode, x: pt.x, y: pt.y, color: "red"});
    }
    if (currentPath) allPaths.push(currentPath);
    currentPath = null;
    pointers = pointers.filter(p => p.pointerId !== e.pointerId);
    if (pointers.length === 0) isPanning = false;
    render();
});

canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const pt = getPos(e);
    view.scale *= delta;
    view.x = e.clientX - pt.x * view.scale;
    view.y = e.clientY - pt.y * view.scale;
    render();
}, {passive: false});

// --- 管理 ---
function startApp() {
    projectName = document.getElementById('project-name').value || "Survey";
    config = PAPER[document.getElementById('paper-size').value];
    document.getElementById('start-overlay').style.display = "none";
    resetView();
    init();
}
function resetView() {
    view = { x: 50, y: 50, scale: Math.min((window.innerWidth-100)/config.w, (window.innerHeight-100)/config.h) };
    render();
}
function setMode(m) {
    mode = m;
    document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
    const btnId = { draw:'btn-draw', erase:'btn-erase', 'stamp-circle':'btn-s1', 'stamp-dot':'btn-s2', 'stamp-double':'btn-s3' }[m];
    if(btnId) document.getElementById(btnId).classList.add('active');
    render();
}
function undo() { allPaths.pop(); render(); }
document.getElementById('map-input').onchange = e => {
    const reader = new FileReader();
    reader.onload = f => { mapImg.src = f.target.result; mapImg.onload = render; };
    reader.readAsDataURL(e.target.files[0]);
};
async function exportZip() {
    const zip = new JSZip();
    zip.file("data.json", JSON.stringify({allPaths, config}));
    const blob = await zip.generateAsync({type:"blob"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = projectName+".zip"; a.click();
}
</script>
</body>
</html>
