<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猛禽類調査 Pro - Stamp Mode</title>
    <style>
        :root { 
            --bg-color: #dadce3; 
            --ui-bg: rgba(255, 255, 255, 0.95); 
            --accent: #3498db; 
        }
        body { 
            margin: 0; overflow: hidden; background: var(--bg-color); 
            font-family: sans-serif; position: fixed; width: 100%; height: 100%; 
        }
        
        #toolbar { 
            position: fixed; top: 10px; left: 10px; z-index: 1000; background: var(--ui-bg); 
            padding: 12px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 200px; max-height: 90vh; overflow-y: auto;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .section-title { font-size: 10px; font-weight: bold; color: #2c3e50; border-left: 3px solid var(--accent); padding-left: 6px; margin-top: 4px;}
        .btn-group { display: flex; flex-wrap: wrap; gap: 4px; }
        button { padding: 8px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 6px; font-size: 11px; flex: 1; min-width: 40px;}
        button.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        .color-btn { 
            width: 32px; height: 32px; border-radius: 50%; 
            border: 2px solid transparent; flex: none; 
            transition: all 0.2s; box-sizing: border-box; cursor: pointer;
        }
        .color-btn.selected {
            border: 3px solid #fff !important;
            box-shadow: 0 0 0 2px var(--accent), 0 4px 10px rgba(0,0,0,0.3);
            transform: scale(1.1);
        }

        #viewport { width: 100vw; height: 100vh; display: block; touch-action: none; }

        @media print {
            @page { size: A3 landscape; margin: 0; }
            body { background: white !important; }
            #toolbar { display: none !important; }
        }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="section-title">PROJECT</div>
    <div class="btn-group">
        <button onclick="exportProjectJSON()">保存</button>
        <button onclick="document.getElementById('importFile').click()">開く</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProjectJSON(this)">
    </div>
    <div class="section-title">MAP</div>
    <input type="file" id="mapInput" accept="image/*" style="font-size: 9px; width: 100%;">
    <button onclick="resetView()">全体表示</button>

    <div class="section-title">DRAW / ERASE</div>
    <div class="btn-group">
        <button id="btn-draw" class="active" onclick="setMode('draw')">ペン</button>
        <button id="btn-erase" onclick="setMode('erase')">消去</button>
        <button onclick="undo()">Undo</button>
    </div>

    <div class="section-title">STAMP</div>
    <div class="btn-group">
        <button id="btn-s1" onclick="setMode('stamp-circle')">〇</button>
        <button id="btn-s2" onclick="setMode('stamp-dot')">●</button>
        <button id="btn-s3" onclick="setMode('stamp-double')">◎</button>
    </div>

    <div class="btn-group" id="colorPicker" style="margin-top: 4px;"></div>

    <div class="section-title">EXPORT</div>
    <div class="btn-group">
        <button onclick="exportDXF()">DXF</button>
        <button onclick="exportPDF()" style="border-color: var(--accent); color: var(--accent); font-weight: bold;">PDF</button>
    </div>
</div>

<canvas id="viewport"></canvas>

<script>
const A3_W = 1587, A3_H = 1123;
const canvas = document.getElementById('viewport');
const ctx = canvas.getContext('2d');
let mapImage = new Image();
let allPaths = [], currentPath = null;
let mode = 'draw', currentColor = 'red';
let view = { x: 0, y: 0, scale: 0.4 };
let lastPointers = [];
let isPanning = false;

function init() {
    window.addEventListener('resize', resize);
    resize();
    view.x = window.innerWidth / 2;
    view.y = window.innerHeight / 2;
    createColorButtons();
    render();
}

function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
    render();
}

function toCanvas(sx, sy) {
    const rect = canvas.getBoundingClientRect();
    return { 
        x: (sx - rect.left - view.x) / view.scale + A3_W / 2, 
        y: (sy - rect.top - view.y) / view.scale + A3_H / 2 
    };
}

function render() {
    const dpr = window.devicePixelRatio || 1;
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = "#dadce3"; 
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.restore();

    ctx.save();
    ctx.translate(view.x, view.y);
    ctx.scale(view.scale, view.scale);
    ctx.translate(-A3_W / 2, -A3_H / 2);

    ctx.beginPath(); ctx.rect(0, 0, A3_W, A3_H); ctx.clip();
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, A3_W, A3_H);
    
    if (mapImage && mapImage.complete && mapImage.naturalWidth > 0) {
        const scale = Math.min(A3_W / mapImage.naturalWidth, A3_H / mapImage.naturalHeight);
        ctx.drawImage(mapImage, (A3_W - mapImage.naturalWidth * scale) / 2, (A3_H - mapImage.naturalHeight * scale) / 2, mapImage.naturalWidth * scale, mapImage.naturalHeight * scale);
    }

    const drawItem = (item) => {
        if (!item) return;
        ctx.strokeStyle = ctx.fillStyle = item.color;
        // スケールに応じて太さを変える（見た目の太さを固定）
        ctx.lineWidth = 2.5 / view.scale; 
        
        if (item.type && item.type.startsWith('stamp')) {
            const r = 12 / view.scale;
            ctx.beginPath();
            ctx.arc(item.x, item.y, r, 0, Math.PI * 2);
            if (item.type === 'stamp-dot') ctx.fill();
            else ctx.stroke();
            if (item.type === 'stamp-double') {
                ctx.beginPath();
                ctx.arc(item.x, item.y, r * 0.6, 0, Math.PI * 2);
                ctx.stroke();
            }
        } else {
            if (!item.points || item.points.length < 2) return;
            ctx.beginPath();
            ctx.lineCap = ctx.lineJoin = "round";
            ctx.moveTo(item.points[0].x, item.points[0].y);
            item.points.forEach(pt => ctx.lineTo(pt.x, pt.y));
            ctx.stroke();
        }
    };

    allPaths.forEach(drawItem);
    if (currentPath) drawItem(currentPath);
    ctx.restore();

    ctx.save();
    ctx.translate(view.x, view.y);
    ctx.scale(view.scale, view.scale);
    ctx.translate(-A3_W / 2, -A3_H / 2);
    ctx.strokeStyle = "rgba(0,0,0,0.15)";
    ctx.lineWidth = 1 / view.scale;
    ctx.strokeRect(0, 0, A3_W, A3_H);
    ctx.restore();
}

canvas.addEventListener('pointerdown', e => {
    lastPointers.push(e);
    if (lastPointers.length > 1 || e.buttons === 2) {
        isPanning = true; currentPath = null;
    } else if (e.buttons === 1) {
        const pt = toCanvas(e.clientX, e.clientY);
        if (pt.x < 0 || pt.x > A3_W || pt.y < 0 || pt.y > A3_H) return;

        if (mode.startsWith('stamp')) {
            allPaths.push({ type: mode, x: pt.x, y: pt.y, color: currentColor });
            render();
        } else if (mode === 'draw') {
            currentPath = { type: 'draw', points: [pt], color: currentColor };
        } else if (mode === 'erase') {
            allPaths = allPaths.filter(item => {
                if (item.type === 'draw') return !item.points.some(p => Math.hypot(p.x-pt.x, p.y-pt.y) < 20/view.scale);
                return Math.hypot(item.x-pt.x, item.y-pt.y) > 20/view.scale;
            });
            render();
        }
    }
});

window.addEventListener('pointermove', e => {
    const idx = lastPointers.findIndex(p => p.pointerId === e.pointerId);
    if (idx === -1) return;
    const prev = lastPointers[idx];
    if (isPanning) {
        if (lastPointers.length === 2) {
            const other = lastPointers[idx === 0 ? 1 : 0];
            const oldDist = Math.hypot(prev.clientX - other.clientX, prev.clientY - other.clientY);
            const newDist = Math.hypot(e.clientX - other.clientX, e.clientY - other.clientY);
            view.scale *= (newDist / oldDist);
        }
        view.x += e.clientX - prev.clientX; view.y += e.clientY - prev.clientY;
    } else if (currentPath) {
        currentPath.points.push(toCanvas(e.clientX, e.clientY));
    }
    lastPointers[idx] = e;
    render();
});

window.addEventListener('pointerup', e => {
    lastPointers = lastPointers.filter(p => p.pointerId !== e.pointerId);
    if (lastPointers.length === 0) {
        if (currentPath) { allPaths.push(currentPath); currentPath = null; }
        isPanning = false;
    }
    render();
});

function exportDXF() {
    let dxf = "0\nSECTION\n2\nENTITIES\n";
    const colorMap = { 'red': 1, 'blue': 5, 'purple': 6, 'green': 3, 'orange': 40, 'black': 7 };
    allPaths.forEach(item => {
        const c = colorMap[item.color] || 7;
        if (item.type === 'draw') {
            dxf += `0\nPOLYLINE\n8\nSurvey\n62\n${c}\n66\n1\n`;
            item.points.forEach(pt => dxf += `0\nVERTEX\n8\nSurvey\n10\n${pt.x}\n20\n${-pt.y}\n`);
            dxf += "0\nSEQEND\n";
        } else {
            dxf += `0\nCIRCLE\n8\nSurvey\n62\n${c}\n10\n${item.x}\n20\n${-item.y}\n40\n15.0\n`;
            if (item.type === 'stamp-double') dxf += `0\nCIRCLE\n8\nSurvey\n62\n${c}\n10\n${item.x}\n20\n${-item.y}\n40\n8.0\n`;
        }
    });
    dxf += "0\nENDSEC\n0\nEOF";
    const blob = new Blob([dxf], {type: 'application/dxf'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Survey_${Date.now()}.dxf`; a.click();
}

function exportProjectJSON() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify({map: mapImage.src, paths: allPaths})], {type: 'application/json'}));
    a.download = `Project_${Date.now()}.json`; a.click();
}

function importProjectJSON(input) {
    const reader = new FileReader();
    reader.onload = e => {
        const data = JSON.parse(e.target.result);
        allPaths = data.paths || [];
        const temp = new Image(); temp.onload = () => { mapImage = temp; resetView(); }; temp.src = data.map || "";
    };
    reader.readAsText(input.files[0]);
}

function resetView() {
    const p = 60; view.scale = Math.min((window.innerWidth - p) / A3_W, (window.innerHeight - p) / A3_H);
    view.x = window.innerWidth / 2; view.y = window.innerHeight / 2; render();
}

document.getElementById('mapInput').onchange = e => {
    const reader = new FileReader();
    reader.onload = f => { const t = new Image(); t.onload = () => { mapImage = t; resetView(); }; t.src = f.target.result; };
    reader.readAsDataURL(e.target.files[0]);
};

function exportPDF() {
    const v = {...view}; view.scale = Math.min(window.innerWidth/A3_W, window.innerHeight/A3_H);
    view.x = window.innerWidth/2; view.y = window.innerHeight/2; render();
    setTimeout(() => { window.print(); view = v; render(); }, 300);
}

const colors = ['red', 'blue', 'purple', 'green', 'orange', 'black'];
function createColorButtons() {
    const cp = document.getElementById('colorPicker'); cp.innerHTML = '';
    colors.forEach(c => {
        const b = document.createElement('button'); b.className = 'color-btn' + (c === currentColor ? ' selected' : '');
        b.style.backgroundColor = c; b.onclick = () => { currentColor = c; createColorButtons(); }; cp.appendChild(b);
    });
}

function setMode(m) {
    mode = m;
    const ids = ['btn-draw', 'btn-erase', 'btn-s1', 'btn-s2', 'btn-s3'];
    const activeId = m === 'draw' ? 'btn-draw' : m === 'erase' ? 'btn-erase' : m === 'stamp-circle' ? 'btn-s1' : m === 'stamp-dot' ? 'btn-s2' : 'btn-s3';
    ids.forEach(id => document.getElementById(id).classList.toggle('active', id === activeId));
}

function undo() { allPaths.pop(); render(); }
canvas.addEventListener('wheel', e => {
    e.preventDefault(); const f = Math.pow(0.999, e.deltaY);
    view.x = e.clientX - (e.clientX - view.x) * f; view.y = e.clientY - (e.clientY - view.y) * f;
    view.scale *= f; render();
}, { passive: false });

init();
</script>
</body>
</html>
