<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猛禽類調査野帳 V5</title>

    <!-- PWA: ホーム画面追加・オフライン対応 -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="猛禽野帳">
    <meta name="theme-color" content="#e9e4d8">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch((err) => {
                    console.warn('Service Worker登録に失敗しました:', err);
                });
            });
        }
    </script>
    <style>
        :root { 
            --accent: #2563eb; 
            --accent-geo: #059669;
            --bg-panel: rgba(255, 255, 255, 0.95);
            --border: #e2e8f0;
            --text: #1e293b;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; overflow: hidden; background: #f1f5f9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            position: fixed; width: 100%; height: 100%; touch-action: none; 
        }
        #toolbar { 
            position: fixed; top: 20px; left: 20px; z-index: 1000; 
            background: var(--bg-panel); backdrop-filter: blur(10px);
            padding: 16px; border-radius: 16px; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 240px; 
            max-height: 85vh; overflow-y: auto; border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #toolbar.hidden { transform: translateX(-280px); opacity: 0; pointer-events: none; }
        #toggle-btn {
            position: fixed; top: 20px; left: 272px; z-index: 1002;
            width: 44px; height: 44px; background: var(--accent); color: white;
            border: none; border-radius: 12px; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            display: flex; align-items: center; justify-content: center;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .start-card {
            background: white; padding: 32px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .start-card h2 { margin-top: 0; color: var(--text); }
        .start-card input[type="text"] {
            width: 100%; padding: 12px; margin: 15px 0; border: 2px solid var(--border);
            border-radius: 8px; font-size: 16px;
        }
        .start-card button {
            width: 100%; padding: 12px; background: var(--accent); color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        .size-selector { text-align: left; margin: 15px 0; padding: 10px; background: #f8fafc; border-radius: 8px; }
        .size-selector label { display: block; margin: 8px 0; cursor: pointer; font-size: 14px; color: var(--text); }
        .section { display: flex; flex-direction: column; gap: 6px; }
        .section-title { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 2px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn-group.triple { grid-template-columns: 1fr 1fr 1fr; }
        button { 
            padding: 10px 8px; cursor: pointer; border: 1px solid var(--border); 
            background: #fff; border-radius: 8px; font-size: 12px; font-weight: 500;
            color: var(--text); transition: transform 0.1s ease, background 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 4px;
            white-space: nowrap; overflow: hidden;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        button:hover { background: #f8fafc; border-color: #cbd5e1; }
        button:active { transform: scale(0.92); }
        button.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        button.active:active, button.active-geo:active { transform: scale(0.92); }
        button.active-geo { background: var(--accent-geo); color: white; border-color: var(--accent-geo); box-shadow: 0 4px 10px rgba(5, 150, 105, 0.2); }
        #colorPicker { display: flex; flex-wrap: nowrap; gap: 5px; padding: 4px 0; }
        .color-btn { width: 22px; height: 22px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; transition: transform 0.2s; flex-shrink: 0; }
        .color-btn.selected { transform: scale(1.2); border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }
        canvas { display: block; cursor: crosshair; }
        .file-label { font-size: 11px; background: #f1f5f9; padding: 8px; border-radius: 8px; border: 1px dashed #cbd5e1; text-align: center; cursor: pointer; }

        /* 座標ステータスバッジ */
        #geo-status {
            font-size: 10px; padding: 4px 8px; border-radius: 6px;
            background: #fef3c7; color: #92400e; border: 1px solid #fde68a;
            text-align: center; line-height: 1.4;
        }
        #geo-status.calibrated {
            background: #d1fae5; color: #065f46; border-color: #6ee7b7;
        }

        /* 座標入力モーダル */
        #geo-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(6px);
            z-index: 8000; display: none; align-items: center; justify-content: center;
        }
        #geo-modal.open { display: flex; }
        .geo-card {
            background: white; padding: 28px; border-radius: 20px;
            width: 92%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .geo-card h3 { margin: 0 0 6px; color: var(--text); font-size: 16px; }
        .geo-card p { margin: 0 0 18px; color: #64748b; font-size: 13px; line-height: 1.5; }
        .geo-point-label {
            font-size: 11px; font-weight: 700; color: #64748b;
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
        }
        .geo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .geo-row label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #475569; }
        .geo-row input {
            padding: 9px 10px; border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 14px; width: 100%; outline: none;
            transition: border-color 0.2s;
        }
        .geo-row input:focus { border-color: var(--accent-geo); }
        .geo-row input.error { border-color: #ef4444; background: #fff5f5; }
        .geo-btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
        .geo-btn-row button { padding: 11px; font-size: 13px; font-weight: 600; }
        .btn-confirm { background: var(--accent-geo) !important; color: white !important; border-color: var(--accent-geo) !important; }
        .btn-cancel { background: #f1f5f9 !important; color: #64748b !important; }

        .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

        /* toggle-btn はツールバーの右上に独立配置 */
        #toggle-btn {
            position: fixed; top: 20px; left: 270px; z-index: 1002;
        }
        #toolbar.hidden ~ #toggle-btn,
        #toolbar.hidden + #toggle-btn { left: 20px; }

        /* PNG解像度セレクター */
        .res-selector {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
        }
        .res-btn {
            padding: 6px 4px; font-size: 11px; font-weight: 600;
            border-radius: 6px; border: 1px solid var(--border);
            background: #fff; color: var(--text); cursor: pointer;
            text-align: center; transition: all 0.15s;
        }
        .res-btn.active { background: #eff6ff; color: var(--accent); border-color: #bfdbfe; }

        /* エクスポートボタンを縦並びに整列 */
        .export-stack { display: flex; flex-direction: column; gap: 6px; }
        .export-stack button { width: 100%; justify-content: flex-start; padding: 10px 12px; }
    </style>
</head>
<body>

<!-- ===== 起動オーバーレイ ===== -->
<div id="start-overlay">
    <div class="start-card">
        <h2>調査開始</h2>
        <p style="color:#64748b;font-size:14px;">新規プロジェクト名を入力</p>
        <input type="text" id="project-name-input" placeholder="例: 〇〇地区 猛禽類調査">
        <div class="size-selector">
            <p style="margin:0 0 8px;font-weight:bold;font-size:12px;color:#64748b;">用紙サイズを選択</p>
            <label><input type="radio" name="paper-size" value="A3_LANDSCAPE" checked> A3横 (420×297mm)</label>
            <label><input type="radio" name="paper-size" value="A4_PORTRAIT"> A4縦 (210×297mm)</label>
        </div>
        <button onclick="startProject()">新規開始</button>
        <div style="margin:15px 0;border-top:1px solid #e2e8f0;padding-top:15px;">
            <p style="color:#64748b;font-size:14px;">または既存ファイルから再開</p>
            <button onclick="document.getElementById('importFile').click()" style="background:#64748b;color:white;">ファイルを選択</button>
        </div>
    </div>
</div>

<!-- ===== 座標入力モーダル ===== -->
<div id="geo-modal">
    <div class="geo-card">
        <h3>🌍 座標キャリブレーション</h3>
        <p>指定した範囲の<strong>左上</strong>と<strong>右下</strong>の緯度・経度を入力してください。<br>入力後、GeoJSON出力が実際の地理座標で行われます。</p>

        <div class="geo-point-label">📍 左上（Northwest）</div>
        <div class="geo-row">
            <label>緯度（Lat）<input type="number" id="nw-lat" step="0.000001" placeholder="例: 35.681236"></label>
            <label>経度（Lng）<input type="number" id="nw-lng" step="0.000001" placeholder="例: 139.767125"></label>
        </div>

        <div class="geo-point-label">📍 右下（Southeast）</div>
        <div class="geo-row">
            <label>緯度（Lat）<input type="number" id="se-lat" step="0.000001" placeholder="例: 35.658517"></label>
            <label>経度（Lng）<input type="number" id="se-lng" step="0.000001" placeholder="例: 139.745433"></label>
        </div>

        <div class="geo-btn-row">
            <button class="btn-cancel" onclick="closeGeoModal()">キャンセル</button>
            <button class="btn-confirm" onclick="confirmGeoCalibration()">✓ 確定</button>
        </div>
    </div>
</div>

<!-- ===== UI ===== -->
<button id="toggle-btn" onclick="toggleToolbar()">☰</button>

<div id="toolbar">
    <div class="section">
        <div class="section-title">Project</div>
        <div class="btn-group">
            <button onclick="exportProjectJSON()">💾 保存</button>
            <button onclick="document.getElementById('importFile').click()">📂 開く</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProjectJSON(this)">
    </div>

    <div class="section">
        <div class="section-title">Basemap</div>
        <label class="file-label" for="mapInput">🗺️ 画像を選択</label>
        <input type="file" id="mapInput" accept="image/*" style="display:none">
        <button onclick="resetView()" style="margin-top:4px;">センター復帰</button>
    </div>

    <div class="section">
        <div class="section-title">Drawing Tools</div>
        <div class="btn-group triple">
            <button id="btn-draw" class="active" onclick="setMode('draw')">✏️ メモ</button>
            <button id="btn-arrow" onclick="setMode('arrow')">↗️ 矢印</button>
            <button id="btn-erase" onclick="setMode('erase')">🧹 消去</button>
        </div>
        <div class="btn-group">
            <button id="btn-window" onclick="setMode('window')">🖼️ 印刷窓</button>
            <button id="btn-overlay-toggle" onclick="toggleOverlayVisible()" title="枠の表示/非表示">👁</button>
            <button onclick="undo()">↩️ 戻る</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Analysis Stamps</div>
        <div class="btn-group triple">
            <button id="btn-s1" onclick="setMode('stamp-circle')" title="単円スタンプ">
                <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button id="btn-s2" onclick="setMode('stamp-dot')" title="ドットスタンプ">
                <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="currentColor"/></svg>
            </button>
            <button id="btn-s3" onclick="setMode('stamp-double')" title="二重円スタンプ">
                <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Color</div>
        <div id="colorPicker"></div>
    </div>

    <hr class="divider">

    <!-- 座標セクション -->
    <div class="section">
        <div class="section-title">Geo Reference</div>
        <div id="geo-status">座標未設定<br>GeoJSON出力はピクセル座標</div>
        <button id="btn-georef" onclick="setMode('georef')">📐 座標範囲を指定</button>
        <button onclick="clearGeoRef()" style="font-size:11px;color:#94a3b8;padding:6px;">✕ 座標設定をリセット</button>
    </div>

    <hr class="divider">

    <div class="section">
        <div class="section-title">Export</div>
        <div class="export-stack">
            <button onclick="exportDXF()">📐 AutoCAD用 (DXF)</button>
            <button onclick="exportGeoJSON()" style="background:#f0fdf4;color:#166534;border-color:#bbf7d0;">🌍 QGIS用 (GeoJSON)</button>
            <button onclick="exportSVG()" style="background:#fdf4ff;color:#7e22ce;border-color:#e9d5ff;">✏️ Illustrator用 (SVG)</button>
        </div>
        <div class="section-title" style="margin-top:8px;">PNG解像度</div>
        <div class="res-selector" id="res-selector">
            <div class="res-btn active" data-scale="1" onclick="setResScale(1)">等倍</div>
            <div class="res-btn" data-scale="2" onclick="setResScale(2)">×2</div>
            <div class="res-btn" data-scale="3" onclick="setResScale(3)">×3<br><span style="font-size:9px;opacity:.7">推奨</span></div>
        </div>
        <div id="res-info" style="font-size:10px;color:#64748b;text-align:center;margin-top:2px;"></div>
        <button onclick="exportImageWithWindow()" style="background:#eff6ff;color:var(--accent);border-color:#bfdbfe;width:100%;">📸 印刷窓でPNG出力</button>
    </div>
</div>

<canvas id="viewport"></canvas>

<script>
// ============================================================
//  定数・状態
// ============================================================
const SIZES = {
    A3_LANDSCAPE: { w: 1587, h: 1123 },
    A4_PORTRAIT:  { w: 842,  h: 1191 }
};
const STAMP_RADIUS = 3.5; // スタンプ半径を一元管理

const canvas = document.getElementById('viewport');
const ctx    = canvas.getContext('2d');

let currentSize  = SIZES.A3_LANDSCAPE;
let mapImage     = new Image();
let allPaths     = [];
let currentPath  = null;
let mode         = 'draw';
let currentColor = '#ef4444';
let view         = { x: 0, y: 0, scale: 0.5 };
let lastPointers = [];
let isPanning    = false;
let windowRect      = null;   // 印刷窓
let isDirty         = false;  // 未保存の変更フラグ
let windowVisible   = true;   // 印刷窓の表示フラグ
let georefVisible   = true;   // 座標範囲枠の表示フラグ
let windowStart  = null;
let projectName  = '';
let currentMousePos = null;
let exportScale  = 3;  // PNG出力倍率（デフォルト×3）

// --- 座標キャリブレーション ---
let geoRef = null;
/*
  geoRef = {
    pixelRect: { x, y, w, h },   // キャンバス座標系での指定範囲
    nwLat, nwLng,                 // 左上の緯度経度
    seLat, seLng                  // 右下の緯度経度
  }
*/
let georefStart = null;   // 座標指定のドラッグ開始点
let georefRect  = null;   // 確定前の描画用矩形

// ============================================================
//  初期化
// ============================================================
function init() {
    window.addEventListener('resize', resize);
    resize();
    view.x = window.innerWidth / 2;
    view.y = window.innerHeight / 2;
    createColorButtons();
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    document.getElementById('mapInput').onchange = e => {
        const r = new FileReader();
        r.onload = f => { mapImage = new Image(); mapImage.onload = resetView; mapImage.src = f.target.result; };
        if (e.target.files[0]) r.readAsDataURL(e.target.files[0]);
    };
    setResScale(3); // デフォルト×3
    render();
}

// ============================================================
//  プロジェクト管理
// ============================================================
function startProject() {
    const input = document.getElementById('project-name-input');
    if (!input.value.trim()) { alert('業務名を入力してください。'); return; }
    const key = document.querySelector('input[name="paper-size"]:checked').value;
    currentSize  = SIZES[key];
    projectName  = input.value.trim();
    document.getElementById('start-overlay').style.display = 'none';
    resetView();
}

function getFormattedDate() {
    const n = new Date();
    return `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}`;
}

function exportProjectJSON() {
    const data = {
        version: 5,
        projectName,
        currentSize,
        map: mapImage.src,
        paths: allPaths,
        windowRect,   // 印刷窓も保存
        geoRef        // 座標設定も保存
    };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], { type: 'application/json' }));
    a.download = `${projectName}_${getFormattedDate()}.json`;
    a.click();
    isDirty = false;  // 保存完了
}

function importProjectJSON(input) {
    const r = new FileReader();
    r.onload = e => {
        try {
            const d = JSON.parse(e.target.result);
            allPaths    = d.paths      || [];
            projectName = d.projectName || '復元';
            currentSize = d.currentSize || SIZES.A3_LANDSCAPE;
            windowRect  = d.windowRect  || null;
            geoRef      = d.geoRef      || null;
            updateGeoStatus();
            mapImage = new Image();
            mapImage.onload = () => { resetView(); render(); };
            mapImage.src = d.map || '';
            document.getElementById('start-overlay').style.display = 'none';
        } catch { alert('ファイルの読み込みに失敗しました。'); }
    };
    if (input.files[0]) r.readAsText(input.files[0]);
}

// ============================================================
//  座標キャリブレーション
// ============================================================
function openGeoModal() {
    // 既存の値があれば復元
    if (geoRef) {
        document.getElementById('nw-lat').value = geoRef.nwLat;
        document.getElementById('nw-lng').value = geoRef.nwLng;
        document.getElementById('se-lat').value = geoRef.seLat;
        document.getElementById('se-lng').value = geoRef.seLng;
    }
    document.getElementById('geo-modal').classList.add('open');
}

function closeGeoModal() {
    document.getElementById('geo-modal').classList.remove('open');
    georefRect = null;
    setMode('draw');
    render();
}

function confirmGeoCalibration() {
    const fields = ['nw-lat','nw-lng','se-lat','se-lng'];
    const vals = {};
    let ok = true;
    fields.forEach(id => {
        const el = document.getElementById(id);
        const v  = parseFloat(el.value);
        el.classList.remove('error');
        if (isNaN(v)) { el.classList.add('error'); ok = false; }
        else vals[id] = v;
    });
    if (!ok) { alert('すべての座標を正しく入力してください。'); return; }

    // 緯度・経度の論理チェック
    if (vals['nw-lat'] <= vals['se-lat']) {
        alert('左上の緯度は右下より大きい値（北側）にしてください。'); return;
    }
    if (vals['nw-lng'] >= vals['se-lng']) {
        alert('左上の経度は右下より小さい値（西側）にしてください。'); return;
    }

    geoRef = {
        pixelRect: { ...georefRect },
        nwLat: vals['nw-lat'], nwLng: vals['nw-lng'],
        seLat: vals['se-lat'], seLng: vals['se-lng']
    };
    georefRect = null;
    updateGeoStatus();
    document.getElementById('geo-modal').classList.remove('open');
    setMode('draw');
    render();
}

function clearGeoRef() {
    if (!geoRef) return;
    if (!confirm('座標設定をリセットしますか？')) return;
    geoRef = null;
    georefRect = null;
    updateGeoStatus();
    render();
}

function updateGeoStatus() {
    const el = document.getElementById('geo-status');
    if (geoRef) {
        el.className = 'calibrated';
        el.textContent = `座標設定済み\nNW: ${geoRef.nwLat.toFixed(5)}, ${geoRef.nwLng.toFixed(5)}\nSE: ${geoRef.seLat.toFixed(5)}, ${geoRef.seLng.toFixed(5)}`;
        el.style.whiteSpace = 'pre-line';
    } else {
        el.className = '';
        el.textContent = '座標未設定\nGeoJSON出力はピクセル座標';
        el.style.whiteSpace = 'pre-line';
    }
}

/**
 * ピクセル座標 → 地理座標 の線形変換
 * geoRef の pixelRect を基準に補間する
 */
function pixelToGeo(px, py) {
    if (!geoRef) return [px, -py]; // フォールバック：旧来のピクセル座標
    const { pixelRect: r, nwLat, nwLng, seLat, seLng } = geoRef;
    const tx = (px - r.x) / r.w; // 0..1 (西→東)
    const ty = (py - r.y) / r.h; // 0..1 (北→南)
    const lng = nwLng + tx * (seLng - nwLng);
    const lat = nwLat + ty * (seLat - nwLat);
    return [lng, lat];
}

// ============================================================
//  描画
// ============================================================
function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    render();
}

function toCanvas(sx, sy) {
    return { x: (sx - view.x) / view.scale + currentSize.w / 2,
             y: (sy - view.y) / view.scale + currentSize.h / 2 };
}

function renderOnCtx(targetCtx, w, h) {
    targetCtx.fillStyle = '#fff';
    targetCtx.fillRect(0, 0, w, h);

    // 地図画像
    if (mapImage.complete && mapImage.naturalWidth > 0) {
        const s = Math.min(w / mapImage.naturalWidth, h / mapImage.naturalHeight);
        targetCtx.drawImage(mapImage,
            (w - mapImage.naturalWidth  * s) / 2,
            (h - mapImage.naturalHeight * s) / 2,
            mapImage.naturalWidth  * s,
            mapImage.naturalHeight * s);
    }

    // 各アイテム描画
    const drawItem = (item) => {
        targetCtx.save();
        targetCtx.strokeStyle = targetCtx.fillStyle = item.color;

        if (item.type && item.type.startsWith('stamp')) {
            const r = STAMP_RADIUS;
            targetCtx.lineWidth = 1.5;
            targetCtx.beginPath();
            targetCtx.arc(item.x, item.y, r, 0, Math.PI * 2);
            if (item.type === 'stamp-dot') {
                targetCtx.fill();
            } else {
                targetCtx.stroke();
                if (item.type === 'stamp-double') {
                    targetCtx.beginPath();
                    targetCtx.arc(item.x, item.y, r * 0.6, 0, Math.PI * 2);
                    targetCtx.stroke();
                }
            }
        } else if (item.points && item.points.length > 0) {
            targetCtx.lineWidth  = (item.type === 'draw') ? 1 : 2;
            targetCtx.lineCap    = 'round';
            targetCtx.lineJoin   = 'round';
            targetCtx.beginPath();
            targetCtx.moveTo(item.points[0].x, item.points[0].y);
            item.points.forEach(p => targetCtx.lineTo(p.x, p.y));
            targetCtx.stroke();

            if (item.type === 'arrow' && item.points.length >= 2) {
                const p2    = item.points[item.points.length - 1];
                const p1    = item.points[item.points.length - 2];
                const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                const head  = 15;
                targetCtx.beginPath();
                targetCtx.moveTo(p2.x, p2.y);
                targetCtx.lineTo(p2.x - head * Math.cos(angle - Math.PI/6), p2.y - head * Math.sin(angle - Math.PI/6));
                targetCtx.moveTo(p2.x, p2.y);
                targetCtx.lineTo(p2.x - head * Math.cos(angle + Math.PI/6), p2.y - head * Math.sin(angle + Math.PI/6));
                targetCtx.stroke();
            }
        }
        targetCtx.restore();
    };

    allPaths.forEach(i => drawItem(i));
    if (currentPath) drawItem(currentPath);
}

function render() {
    const dpr = window.devicePixelRatio || 1;
    // 背景
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#f1f5f9';
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.restore();

    // 変換行列でキャンバス座標系へ
    ctx.save();
    ctx.translate(view.x, view.y);
    ctx.scale(view.scale, view.scale);
    ctx.translate(-currentSize.w / 2, -currentSize.h / 2);

    renderOnCtx(ctx, currentSize.w, currentSize.h);

    // スタンププレビュー
    if (mode.startsWith('stamp') && currentMousePos && !isPanning) {
        const pt = toCanvas(currentMousePos.x, currentMousePos.y);
        ctx.globalAlpha = 0.5;
        ctx.strokeStyle = ctx.fillStyle = currentColor;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, STAMP_RADIUS, 0, Math.PI * 2);
        mode === 'stamp-dot' ? ctx.fill() : ctx.stroke();
        ctx.globalAlpha = 1.0;
    }

    // 印刷窓（非表示フラグ時はスキップ）
    if (windowRect && windowVisible) {
        ctx.save();
        ctx.strokeStyle = 'rgba(37, 99, 235, 0.8)';
        ctx.lineWidth   = 2 / view.scale;
        ctx.setLineDash([5 / view.scale, 5 / view.scale]);
        ctx.strokeRect(windowRect.x, windowRect.y, windowRect.w, windowRect.h);
        ctx.restore();
    }

    // 座標範囲プレビュー（確定前）
    if (georefRect) {
        ctx.save();
        ctx.strokeStyle = 'rgba(5, 150, 105, 0.9)';
        ctx.fillStyle   = 'rgba(5, 150, 105, 0.08)';
        ctx.lineWidth   = 2 / view.scale;
        ctx.setLineDash([6 / view.scale, 4 / view.scale]);
        ctx.fillRect(georefRect.x, georefRect.y, georefRect.w, georefRect.h);
        ctx.strokeRect(georefRect.x, georefRect.y, georefRect.w, georefRect.h);
        // コーナーラベル
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(5, 150, 105, 0.9)';
        ctx.font = `${12 / view.scale}px sans-serif`;
        ctx.fillText('NW', georefRect.x + 4/view.scale, georefRect.y + 14/view.scale);
        ctx.fillText('SE', georefRect.x + georefRect.w - 20/view.scale, georefRect.y + georefRect.h - 4/view.scale);
        ctx.restore();
    }

    // 確定済み座標範囲（非表示フラグ時はスキップ）
    if (geoRef && georefVisible) {
        const r = geoRef.pixelRect;
        ctx.save();
        ctx.strokeStyle = 'rgba(5, 150, 105, 0.5)';
        ctx.lineWidth   = 1.5 / view.scale;
        ctx.setLineDash([4 / view.scale, 4 / view.scale]);
        ctx.strokeRect(r.x, r.y, r.w, r.h);
        ctx.restore();
    }

    ctx.restore();
}

// ============================================================
//  イベント
// ============================================================
window.addEventListener('pointermove', e => {
    currentMousePos = { x: e.clientX, y: e.clientY };
    const idx = lastPointers.findIndex(p => p.pointerId === e.pointerId);
    if (idx === -1) { render(); return; }

    const oldPointers = [...lastPointers];
    lastPointers[idx] = e;
    const pt = toCanvas(e.clientX, e.clientY);

    if (isPanning) {
        if (lastPointers.length >= 2) {
            const [p1o, p2o] = [oldPointers[0], oldPointers[1]];
            const [p1n, p2n] = [lastPointers[0], lastPointers[1]];
            const distO = Math.hypot(p1o.clientX - p2o.clientX, p1o.clientY - p2o.clientY);
            const distN = Math.hypot(p1n.clientX - p2n.clientX, p1n.clientY - p2n.clientY);
            if (distO > 0) {
                const ratio = distN / distO;
                const mx = (p1n.clientX + p2n.clientX) / 2;
                const my = (p1n.clientY + p2n.clientY) / 2;
                view.x = mx - (mx - view.x) * ratio;
                view.y = my - (my - view.y) * ratio;
                view.scale *= ratio;
            }
            view.x += ((p1n.clientX - p1o.clientX) + (p2n.clientX - p2o.clientX)) / 2;
            view.y += ((p1n.clientY - p1o.clientY) + (p2n.clientY - p2o.clientY)) / 2;
        } else {
            view.x += e.clientX - oldPointers[idx].clientX;
            view.y += e.clientY - oldPointers[idx].clientY;
        }
    } else if (mode === 'window' && windowStart) {
        windowRect = {
            x: Math.min(windowStart.x, pt.x), y: Math.min(windowStart.y, pt.y),
            w: Math.abs(pt.x - windowStart.x), h: Math.abs(pt.y - windowStart.y)
        };
    } else if (mode === 'georef' && georefStart) {
        georefRect = {
            x: Math.min(georefStart.x, pt.x), y: Math.min(georefStart.y, pt.y),
            w: Math.abs(pt.x - georefStart.x), h: Math.abs(pt.y - georefStart.y)
        };
    } else if (mode === 'erase' && currentPath) {
        // ✅ FIX: 消去はドラッグ中も逐次処理
        eraseAt(pt);
    } else if (currentPath) {
        // ✅ FIX: キャンバス外へのはみ出し描画を防止（範囲内にクランプ)
        const clamped = {
            x: Math.max(0, Math.min(currentSize.w, pt.x)),
            y: Math.max(0, Math.min(currentSize.h, pt.y))
        };
        // 手振れ補正: 指数移動平均（EMA）による平滑化（固定強度）
        const SMOOTH_ALPHA = 0.35;
        const last = currentPath.points[currentPath.points.length - 1];
        const smoothed = last ? {
            x: last.x + SMOOTH_ALPHA * (clamped.x - last.x),
            y: last.y + SMOOTH_ALPHA * (clamped.y - last.y)
        } : clamped;
        currentPath.points.push(smoothed);
    }
    render();
});

function eraseAt(pt) {
    const threshold = 20 / view.scale;
    allPaths = allPaths.filter(item => {
        if (item.points) {
            return !item.points.some(p => Math.hypot(p.x - pt.x, p.y - pt.y) < threshold);
        }
        return Math.hypot(item.x - pt.x, item.y - pt.y) >= threshold;
    });
}

canvas.addEventListener('pointerdown', e => {
    lastPointers.push(e);
    canvas.setPointerCapture(e.pointerId);
    const pt = toCanvas(e.clientX, e.clientY);

    if (e.button === 2 || lastPointers.length > 1) {
        isPanning = true; currentPath = null; return;
    }

    if (mode === 'window') {
        windowStart = pt; windowRect = null; return;
    }
    if (mode === 'georef') {
        georefStart = pt; georefRect = null; return;
    }

    // キャンバス外は描画しない
    if (pt.x < 0 || pt.x > currentSize.w || pt.y < 0 || pt.y > currentSize.h) return;

    if (mode.startsWith('stamp')) {
        allPaths.push({ type: mode, x: pt.x, y: pt.y, color: currentColor }); isDirty = true;
    } else if (mode === 'draw' || mode === 'arrow') {
        currentPath = { type: mode, points: [pt], color: currentColor };
    } else if (mode === 'erase') {
        // ✅ FIX: 消去開始点も即時適用
        currentPath = { _erase: true }; // ドラッグ中フラグ
        eraseAt(pt);
    }
    render();
});

window.addEventListener('pointerup', e => {
    lastPointers = lastPointers.filter(p => p.pointerId !== e.pointerId);
    if (lastPointers.length === 0) {
        isPanning   = false;
        windowStart = null;

        // 印刷窓確定後、解像度情報を更新
        if (mode === 'window' && windowRect) updateResInfo();

        if (mode === 'georef' && georefRect && georefRect.w > 10 && georefRect.h > 10) {
            // 範囲確定 → 座標入力ダイアログを開く
            openGeoModal();
        } else if (georefStart) {
            georefRect = null;
        }
        georefStart = null;

        if (currentPath && !currentPath._erase) {
            allPaths.push(currentPath); isDirty = true;
        }
        currentPath = null;
    }
    render();
});

canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    view.x = e.clientX - (e.clientX - view.x) * delta;
    view.y = e.clientY - (e.clientY - view.y) * delta;
    view.scale *= delta;
    render();
}, { passive: false });

// ============================================================
//  UI
// ============================================================
// ── 離脱警告 ──
window.addEventListener('beforeunload', (e) => {
    if (isDirty) {
        e.preventDefault();
        e.returnValue = '保存されていない変更があります。ページを離れますか？';
    }
});

// 印刷窓・座標範囲枠を連動して表示/非表示トグル
function toggleOverlayVisible() {
    windowVisible = !windowVisible;
    georefVisible = windowVisible;  // 連動
    const btn = document.getElementById('btn-overlay-toggle');
    btn.style.opacity = windowVisible ? '1' : '0.35';
    btn.title = windowVisible ? '枠を非表示にする' : '枠を表示する';
    redraw();
}

function toggleToolbar() {
    const tb  = document.getElementById('toolbar');
    const btn = document.getElementById('toggle-btn');
    tb.classList.toggle('hidden');
    btn.style.left = tb.classList.contains('hidden') ? '20px' : '272px';
}

function setMode(m) {
    mode = m;
    const map = {
        draw: 'btn-draw', arrow: 'btn-arrow', erase: 'btn-erase',
        'stamp-circle': 'btn-s1', 'stamp-dot': 'btn-s2', 'stamp-double': 'btn-s3',
        window: 'btn-window', georef: 'btn-georef'
    };
    Object.values(map).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.className = '';
    });
    if (map[m]) {
        const el = document.getElementById(map[m]);
        if (el) el.className = (m === 'georef') ? 'active-geo' : 'active';
    }
}

function createColorButtons() {
    const cp = document.getElementById('colorPicker');
    cp.innerHTML = '';
    ['#ef4444','#3b82f6','#a855f7','#22c55e','#f59e0b','#0f172a'].forEach(c => {
        const b = document.createElement('div');
        b.className = 'color-btn' + (c === currentColor ? ' selected' : '');
        b.style.background = c;
        b.onclick = () => { currentColor = c; createColorButtons(); };
        cp.appendChild(b);
    });
}

function resetView() {
    const s = Math.min((window.innerWidth - 100) / currentSize.w, (window.innerHeight - 100) / currentSize.h);
    view = { x: window.innerWidth / 2, y: window.innerHeight / 2, scale: s };
    render();
}

function undo() {
    if (allPaths.length > 0) { allPaths.pop(); render(); }
}

//  エクスポート
// ============================================================
function setResScale(s) {
    exportScale = s;
    // ボタンのactive状態を更新
    document.querySelectorAll('.res-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.scale) === s);
    });
    // 出力サイズ情報を表示
    if (windowRect) {
        updateResInfo();
    } else {
        const pw = Math.round(currentSize.w * s);
        const ph = Math.round(currentSize.h * s);
        document.getElementById('res-info').textContent = `全体: ${pw}×${ph}px`;
    }
}

function updateResInfo() {
    if (!windowRect) return;
    const pw = Math.round(windowRect.w * exportScale);
    const ph = Math.round(windowRect.h * exportScale);
    document.getElementById('res-info').textContent = `出力: ${pw}×${ph}px`;
}

function exportImageWithWindow() {
    if (!windowRect) { alert('印刷窓を選択してください'); return; }

    const scale = exportScale;

    // スーパーサンプリング：元サイズ×scale で全体をレンダリング
    const offCanvas = document.createElement('canvas');
    offCanvas.width  = currentSize.w * scale;
    offCanvas.height = currentSize.h * scale;
    const offCtx = offCanvas.getContext('2d');

    // スタンプ・線幅をscaleに合わせて拡大して描画
    offCtx.scale(scale, scale);
    renderOnCtx(offCtx, currentSize.w, currentSize.h);

    // 印刷窓の範囲だけを切り出す（座標もscale倍）
    const expCanvas = document.createElement('canvas');
    expCanvas.width  = Math.round(windowRect.w * scale);
    expCanvas.height = Math.round(windowRect.h * scale);
    expCanvas.getContext('2d').drawImage(
        offCanvas,
        windowRect.x * scale, windowRect.y * scale,
        windowRect.w * scale, windowRect.h * scale,
        0, 0,
        windowRect.w * scale, windowRect.h * scale
    );

    const a = document.createElement('a');
    a.href     = expCanvas.toDataURL('image/png');
    a.download = `${projectName}_${getFormattedDate()}_x${scale}.png`;
    a.click();
}

function exportDXF() {
    const w = currentSize.w, h = currentSize.h;
    const lines = [];

    const add = (...l) => lines.push(...l);

    add('  0','SECTION','  2','HEADER',
        '  9','$ACADVER','  1','AC1009',
        '  9','$EXTMIN',' 10','0.0',' 20',`${-h}`,
        '  9','$EXTMAX',' 10',`${w}`,' 20','0.0',
        '  0','ENDSEC',
        '  0','SECTION','  2','ENTITIES');

    // 用紙枠
    add('  0','POLYLINE','  8','Paper_Outline',' 66','     1');
    [[0,0],[w,0],[w,h],[0,h],[0,0]].forEach(([px,py]) =>
        add('  0','VERTEX','  8','Paper_Outline',' 10',`${px}`,' 20',`${-py}`));
    add('  0','SEQEND');

    allPaths.forEach(item => {
        if (item.points && item.points.length > 1) {
            const layer = item.type === 'arrow' ? 'Arrows' : 'Survey_Notes';
            add('  0','POLYLINE',`  8`,layer,' 66','     1');
            item.points.forEach(p => add('  0','VERTEX',`  8`,layer,' 10',`${p.x}`,' 20',`${-p.y}`));
            add('  0','SEQEND');
        } else if (item.type && item.type.startsWith('stamp')) {
            add('  0','CIRCLE','  8','Stamps',' 10',`${item.x}`,' 20',`${-item.y}`,' 40',`${STAMP_RADIUS}`);
            if (item.type === 'stamp-double') {
                add('  0','CIRCLE','  8','Stamps',' 10',`${item.x}`,' 20',`${-item.y}`,' 40',`${STAMP_RADIUS * 0.6}`);
            }
        }
    });

    add('  0','ENDSEC','  0','EOF');

    const a = document.createElement('a');
    a.href     = URL.createObjectURL(new Blob([lines.join('\n')], { type: 'application/dxf' }));
    a.download = `${projectName}_${getFormattedDate()}.dxf`;
    a.click();
}

function exportGeoJSON() {
    const hasGeo = !!geoRef;

    const features = allPaths.map(item => {
        let geometry;
        if (item.points && item.points.length > 0) {
            geometry = {
                type: 'LineString',
                coordinates: item.points.map(p => pixelToGeo(p.x, p.y))
            };
        } else {
            const [lng, lat] = pixelToGeo(item.x, item.y);
            geometry = { type: 'Point', coordinates: [lng, lat] };
        }
        return {
            type: 'Feature',
            geometry,
            properties: {
                type: item.type,
                color: item.color,
                coordinateSystem: hasGeo ? 'WGS84' : 'pixel_canvas'
            }
        };
    });

    // 座標参照情報をmetadataフィーチャとして含める
    if (hasGeo) {
        features.unshift({
            type: 'Feature',
            geometry: {
                type: 'Polygon',
                coordinates: [[
                    pixelToGeo(geoRef.pixelRect.x, geoRef.pixelRect.y),
                    pixelToGeo(geoRef.pixelRect.x + geoRef.pixelRect.w, geoRef.pixelRect.y),
                    pixelToGeo(geoRef.pixelRect.x + geoRef.pixelRect.w, geoRef.pixelRect.y + geoRef.pixelRect.h),
                    pixelToGeo(geoRef.pixelRect.x, geoRef.pixelRect.y + geoRef.pixelRect.h),
                    pixelToGeo(geoRef.pixelRect.x, geoRef.pixelRect.y)
                ]]
            },
            properties: { type: 'calibration_area', note: 'GeoReference bounding box' }
        });
    }

    const geojson = {
        type: 'FeatureCollection',
        // ⚠️ 座標系の注釈を明示
        crs: hasGeo
            ? { type: 'name', properties: { name: 'urn:ogc:def:crs:OGC:1.3:CRS84' } }
            : null,
        metadata: {
            project: projectName,
            exportDate: getFormattedDate(),
            coordinateSystem: hasGeo
                ? 'WGS84 (EPSG:4326) — 線形補間による近似値'
                : '⚠️ 座標未設定: ピクセル座標。GeoReferenceで設定してください。'
        },
        features
    };

    const a = document.createElement('a');
    a.href     = URL.createObjectURL(new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' }));
    a.download = `${projectName}_${getFormattedDate()}.geojson`;
    a.click();
}

//  起動
// ============================================================
document.addEventListener('DOMContentLoaded', init);

function exportSVG() {
    const W = currentSize.w;
    const H = currentSize.h;
    const hasGeo = !!geoRef;

    // --- ヘルパー: 属性を安全にエスケープ ---
    const esc = s => String(s)
        .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
        .replace(/</g,'&lt;').replace(/>/g,'&gt;');

    // --- ポリラインのd属性を生成 ---
    const pointsToD = pts =>
        pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' ');

    // --- SVGの各要素を組み立て ---
    const parts = [];

    // 1. SVGルート + defs
    // Illustratorが向きを正しく解釈できるよう width/heightにpx単位を明示し
    // x="0" y="0" を追加。横倒し防止のため viewBox の w/h をキャンバスサイズと一致させる
    parts.push(`<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  x="0px" y="0px"
  width="${W}px" height="${H}px" viewBox="0 0 ${W} ${H}"
  xml:space="preserve">`);

    // 2. metadata：地理座標キャリブレーション情報を保持
    parts.push(`  <metadata>`);
    parts.push(`    <raptor:georef xmlns:raptor="https://raptor-survey/ns">`);
    if (hasGeo) {
        const r = geoRef.pixelRect;
        parts.push(`      <raptor:calibrated>true</raptor:calibrated>`);
        parts.push(`      <raptor:pixelRect x="${r.x.toFixed(4)}" y="${r.y.toFixed(4)}" w="${r.w.toFixed(4)}" h="${r.h.toFixed(4)}"/>`);
        parts.push(`      <raptor:nw lat="${geoRef.nwLat}" lng="${geoRef.nwLng}"/>`);
        parts.push(`      <raptor:se lat="${geoRef.seLat}" lng="${geoRef.seLng}"/>`);
        parts.push(`      <raptor:crs>WGS84 (EPSG:4326)</raptor:crs>`);
        parts.push(`      <raptor:note>Linear interpolation. Use pixelRect as reference for back-projection after Illustrator editing.</raptor:note>`);
    } else {
        parts.push(`      <raptor:calibrated>false</raptor:calibrated>`);
    }
    parts.push(`      <raptor:project>${esc(projectName)}</raptor:project>`);
    parts.push(`      <raptor:canvasSize w="${W}" h="${H}"/>`);
    parts.push(`      <raptor:exportDate>${getFormattedDate()}</raptor:exportDate>`);
    parts.push(`    </raptor:georef>`);
    parts.push(`  </metadata>`);

    // 2b. <desc>タグとして座標を二重書き込み
    //     Illustratorは<metadata>やXMLコメントを削除するが<desc>は保持する
    //     編集後のSVG単体でGeoJSON変換が可能になる
    if (hasGeo) {
        const r = geoRef.pixelRect;
        const georefJson = JSON.stringify({
            calibrated: true,
            pixelRect: { x: r.x, y: r.y, w: r.w, h: r.h },
            nw: { lat: geoRef.nwLat, lng: geoRef.nwLng },
            se: { lat: geoRef.seLat, lng: geoRef.seLng },
            crs: "WGS84 (EPSG:4326)",
            project: projectName,
            canvasSize: { w: W, h: H },
            exportDate: getFormattedDate()
        });
        parts.push(`  <desc>RAPTOR_GEOREF:${georefJson}:END_RAPTOR_GEOREF</desc>`);
    }

    // 3. defs：矢印マーカー定義（Illustrator互換形式）
    // marker-end="url(#...)" をIllustratorが線端スタイルとして認識するよう
    // viewBox・markerUnits・orient を正確に指定する
    const arrowColors = [...new Set(
        allPaths.filter(i => i.type === 'arrow').map(i => i.color)
    )];
    parts.push(`  <defs>`);
    arrowColors.forEach(color => {
        const id = 'arrow-' + color.replace('#','');
        parts.push(`    <marker id="${id}"`);
        parts.push(`      viewBox="0 0 10 10" refX="9" refY="5"`);
        parts.push(`      markerUnits="strokeWidth"`);
        parts.push(`      markerWidth="5" markerHeight="5"`);
        parts.push(`      orient="auto">`);
        parts.push(`      <path d="M 0 0 L 10 5 L 0 10 z" fill="${esc(color)}"/>`);
        parts.push(`    </marker>`);
    });
    parts.push(`  </defs>`);

    // 4. 背景白
    parts.push(`  <rect width="${W}" height="${H}" fill="#ffffff"/>`);

    // 5. 地図画像を背景として埋め込み
    if (mapImage.complete && mapImage.naturalWidth > 0) {
        // 地図をキャンバスと同じ表示位置・サイズで計算
        const s  = Math.min(W / mapImage.naturalWidth, H / mapImage.naturalHeight);
        const mw = mapImage.naturalWidth  * s;
        const mh = mapImage.naturalHeight * s;
        const mx = (W - mw) / 2;
        const my = (H - mh) / 2;
        parts.push(`  <!-- basemap image -->`);
        parts.push(`  <image x="${mx.toFixed(2)}" y="${my.toFixed(2)}" width="${mw.toFixed(2)}" height="${mh.toFixed(2)}"`);
        parts.push(`    preserveAspectRatio="xMidYMid meet"`);
        parts.push(`    xlink:href="${mapImage.src}"/>`);
    }

    // 6. 描画データをレイヤーグループに分けて出力
    //    Arrows / Stamps の2グループのみ（メモ・手書き線は除外）
    const groups = {
        'Arrows': allPaths.filter(i => i.type === 'arrow'),
        'Stamps': allPaths.filter(i => i.type && i.type.startsWith('stamp')),
    };

    Object.entries(groups).forEach(([layerName, items]) => {
        if (items.length === 0) return;
        parts.push(`  <g id="${layerName}" inkscape:label="${layerName}" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape">`);

        items.forEach(item => {
            if (item.type === 'arrow' && item.points && item.points.length >= 2) {
                // 線＋三角形ポリゴン分離方式
                // marker-end方式はIllustratorが線を空にするため使用しない
                const pts     = item.points;
                const last    = pts[pts.length - 1];
                const prev    = pts[pts.length - 2];
                const angle   = Math.atan2(last.y - prev.y, last.x - prev.x);
                const headLen = 10;
                const headW   = 5;
                const trimX   = last.x - Math.cos(angle) * headLen;
                const trimY   = last.y - Math.sin(angle) * headLen;
                const trimPts = [...pts.slice(0, -1), { x: trimX, y: trimY }];
                // ① 線本体
                parts.push(`    <path data-raptor="arrow-line" d="${pointsToD(trimPts)}"`);
                parts.push(`      fill="none" stroke="${esc(item.color)}" stroke-width="2"`);
                parts.push(`      stroke-linecap="round" stroke-linejoin="round"/>`);
                // ② 矢印頭部（三角形ポリゴン）
                const sin = Math.sin(angle), cos = Math.cos(angle);
                const ax  = last.x, ay = last.y;
                const bx  = last.x - cos*headLen + sin*headW;
                const by  = last.y - sin*headLen - cos*headW;
                const cx2 = last.x - cos*headLen - sin*headW;
                const cy2 = last.y - sin*headLen + cos*headW;
                parts.push(`    <polygon data-raptor="arrow-head"`);
                parts.push(`      points="${ax.toFixed(2)},${ay.toFixed(2)} ${bx.toFixed(2)},${by.toFixed(2)} ${cx2.toFixed(2)},${cy2.toFixed(2)}"`);
                parts.push(`      fill="${esc(item.color)}" stroke="none"/>`);

            } else if (item.type === 'stamp-circle') {
                parts.push(`    <circle cx="${item.x.toFixed(2)}" cy="${item.y.toFixed(2)}" r="${STAMP_RADIUS}"`);
                parts.push(`      fill="none" stroke="${esc(item.color)}" stroke-width="1.5"/>`);

            } else if (item.type === 'stamp-dot') {
                parts.push(`    <circle cx="${item.x.toFixed(2)}" cy="${item.y.toFixed(2)}" r="${STAMP_RADIUS}"`);
                parts.push(`      fill="${esc(item.color)}"/>`);

            } else if (item.type === 'stamp-double') {
                parts.push(`    <circle cx="${item.x.toFixed(2)}" cy="${item.y.toFixed(2)}" r="${STAMP_RADIUS}"`);
                parts.push(`      fill="none" stroke="${esc(item.color)}" stroke-width="1.5"/>`);
                parts.push(`    <circle cx="${item.x.toFixed(2)}" cy="${item.y.toFixed(2)}" r="${(STAMP_RADIUS * 0.6).toFixed(2)}"`);
                parts.push(`      fill="none" stroke="${esc(item.color)}" stroke-width="1.5"/>`);
            }
        });

        parts.push(`  </g>`);
    });

    parts.push(`</svg>`);

    const svgStr = parts.join('\n');
    const blob   = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const a      = document.createElement('a');
    a.href       = URL.createObjectURL(blob);
    // ファイル名に座標を埋め込む（Illustratorが全タグ・コメントを消しても座標が残る）
    // 形式: プロジェクト名_NW緯度_NW経度_SE緯度_SE経度_日付.svg
    const geoSuffix = hasGeo
        ? `_NW${geoRef.nwLat}_${geoRef.nwLng}_SE${geoRef.seLat}_${geoRef.seLng}`
        : '';
    a.download   = `${projectName}${geoSuffix}_${getFormattedDate()}.svg`;
    a.click();
}
</script>
</body>
</html>
