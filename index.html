<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猛禽類調査 Pro - High Visibility</title>
    <style>
        :root { 
            --bg-color: #dadce3; 
            --ui-bg: rgba(255, 255, 255, 0.95); 
            --accent: #3498db; 
        }
        body { 
            margin: 0; overflow: hidden; background: var(--bg-color); 
            font-family: sans-serif; position: fixed; width: 100%; height: 100%; 
        }
        
        #toolbar { 
            position: fixed; top: 10px; left: 10px; z-index: 1000; background: var(--ui-bg); 
            padding: 12px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 200px; max-height: 90vh; overflow-y: auto;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .section-title { font-size: 10px; font-weight: bold; color: #2c3e50; border-left: 3px solid var(--accent); padding-left: 6px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 4px; }
        button { padding: 8px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 6px; font-size: 11px; flex: 1; }
        button.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        /* 色ボタンの基本スタイル */
        .color-btn { 
            width: 32px; height: 32px; border-radius: 50%; 
            border: 2px solid transparent; flex: none; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-sizing: border-box; 
            cursor: pointer;
        }
        /* 選択中の色ボタン：白い外枠と強い影 */
        .color-btn.selected {
            border: 3px solid #fff !important;
            box-shadow: 0 0 0 2px var(--accent), 0 4px 10px rgba(0,0,0,0.3);
            transform: scale(1.2);
            z-index: 2;
        }

        #viewport { width: 100vw; height: 100vh; display: block; touch-action: none; background: transparent; }

        @media print {
            @page { size: A3 landscape; margin: 0; }
            body { background: white !important; }
            #toolbar { display: none !important; }
            canvas { width: 100% !important; height: auto !important; }
        }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="section-title">PROJECT</div>
    <div class="btn-group">
        <button onclick="exportProjectJSON()">保存</button>
        <button onclick="document.getElementById('importFile').click()">開く</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProjectJSON(this)">
    </div>
    <div class="section-title">MAP (A3 CLIP)</div>
    <input type="file" id="mapInput" accept="image/*" style="font-size: 9px; width: 100%;">
    <button onclick="resetView()">全体表示</button>
    <div class="section-title">TOOLS</div>
    <div class="btn-group">
        <button id="btn-draw" class="active" onclick="setMode('draw')">ペン</button>
        <button id="btn-erase" onclick="setMode('erase')">消しゴム</button>
        <button onclick="undo()">Undo</button>
    </div>
    <div class="btn-group" id="colorPicker"></div>
    <div class="section-title">EXPORT</div>
    <div class="btn-group">
        <button onclick="exportDXF()">DXF</button>
        <button onclick="exportPDF()" style="border-color: var(--accent); color: var(--accent); font-weight: bold;">PDF出力</button>
    </div>
</div>

<canvas id="viewport"></canvas>

<script>
const A3_W = 1587, A3_H = 1123;
const canvas = document.getElementById('viewport');
const ctx = canvas.getContext('2d');
let mapImage = new Image();
let allPaths = [], currentPath = null;
let mode = 'draw', currentColor = 'red';
let view = { x: 0, y: 0, scale: 0.4 };
let lastPointers = [];
let isPanning = false;

function init() {
    window.addEventListener('resize', resize);
    resize();
    view.x = window.innerWidth / 2;
    view.y = window.innerHeight / 2;
    createColorButtons(); // 初回ボタン生成
    render();
}

function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
    render();
}

function toCanvas(sx, sy) {
    const rect = canvas.getBoundingClientRect();
    return { 
        x: (sx - rect.left - view.x) / view.scale + A3_W / 2, 
        y: (sy - rect.top - view.y) / view.scale + A3_H / 2 
    };
}

function render() {
    const dpr = window.devicePixelRatio || 1;
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = "#dadce3"; 
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.restore();

    ctx.save();
    ctx.translate(view.x, view.y);
    ctx.scale(view.scale, view.scale);
    ctx.translate(-A3_W / 2, -A3_H / 2);

    ctx.beginPath();
    ctx.rect(0, 0, A3_W, A3_H);
    ctx.clip();

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, A3_W, A3_H);
    
    if (mapImage.complete && mapImage.src) {
        const imgRatio = mapImage.width / mapImage.height;
        const canvasRatio = A3_W / A3_H;
        let sx, sy, sWidth, sHeight;
        if (imgRatio > canvasRatio) {
            sWidth = mapImage.height * canvasRatio; sHeight = mapImage.height;
            sx = (mapImage.width - sWidth) / 2; sy = 0;
        } else {
            sWidth = mapImage.width; sHeight = mapImage.width / canvasRatio;
            sx = 0; sy = (mapImage.height - sHeight) / 2;
        }
        ctx.drawImage(mapImage, sx, sy, sWidth, sHeight, 0, 0, A3_W, A3_H);
    }

    const drawPath = (path) => {
        if (!path || !path.points || path.points.length < 2) return;
        ctx.beginPath();
        ctx.strokeStyle = path.color;
        ctx.lineWidth = 3 / view.scale;
        ctx.lineCap = ctx.lineJoin = "round";
        ctx.moveTo(path.points[0].x, path.points[0].y);
        path.points.forEach(pt => ctx.lineTo(pt.x, pt.y));
        ctx.stroke();
    };
    allPaths.forEach(drawPath);
    if (currentPath) drawPath(currentPath);
    ctx.restore();
}

// 操作イベント
canvas.addEventListener('pointerdown', e => {
    lastPointers.push(e);
    if (lastPointers.length > 1 || e.buttons === 2) {
        isPanning = true;
        currentPath = null;
    } else if (e.buttons === 1) {
        const pt = toCanvas(e.clientX, e.clientY);
        if (pt.x >= 0 && pt.x <= A3_W && pt.y >= 0 && pt.y <= A3_H) {
            if (mode === 'draw') currentPath = { points: [pt], color: currentColor };
            else allPaths = allPaths.filter(p => !p.points.some(ppp => Math.hypot(ppp.x-pt.x, ppp.y-pt.y) < 20/view.scale));
        }
    }
});

window.addEventListener('pointermove', e => {
    const idx = lastPointers.findIndex(p => p.pointerId === e.pointerId);
    if (idx !== -1) {
        const prev = lastPointers[idx];
        if (isPanning) {
            if (lastPointers.length === 2) {
                const other = lastPointers[idx === 0 ? 1 : 0];
                const oldDist = Math.hypot(prev.clientX - other.clientX, prev.clientY - other.clientY);
                const newDist = Math.hypot(e.clientX - other.clientX, e.clientY - other.clientY);
                view.scale *= (newDist / oldDist);
            }
            view.x += e.clientX - prev.clientX;
            view.y += e.clientY - prev.clientY;
        } else if (currentPath) {
            currentPath.points.push(toCanvas(e.clientX, e.clientY));
        }
        lastPointers[idx] = e;
        render();
    }
});

window.addEventListener('pointerup', e => {
    lastPointers = lastPointers.filter(p => p.pointerId !== e.pointerId);
    if (lastPointers.length === 0) {
        if (currentPath) { allPaths.push(currentPath); currentPath = null; }
        isPanning = false;
    }
    render();
});

function resetView() {
    const padding = 40;
    view.scale = Math.min((window.innerWidth-padding) / A3_W, (window.innerHeight-padding) / A3_H) * 0.9;
    view.x = window.innerWidth / 2;
    view.y = window.innerHeight / 2;
    render();
}

function exportDXF() {
    let dxfContent = "0\nSECTION\n2\nENTITIES\n";
    const colorMap = { 'red': 1, 'blue': 5, 'purple': 6, 'green': 3, 'orange': 40, 'black': 7 };
    allPaths.forEach(path => {
        if (!path.points || path.points.length < 2) return;
        const dxfColor = colorMap[path.color] || 7;
        dxfContent += `0\nPOLYLINE\n8\nFlightPath\n62\n${dxfColor}\n66\n1\n`;
        path.points.forEach(pt => {
            dxfContent += `0\nVERTEX\n8\nFlightPath\n10\n${pt.x}\n20\n${-pt.y}\n`;
        });
        dxfContent += "0\nSEQEND\n";
    });
    dxfContent += "0\nENDSEC\n0\nEOF";
    const blob = new Blob([dxfContent], {type: 'application/dxf'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `SurveyLines_${Date.now()}.dxf`;
    link.click();
}

// 保存・読込
function exportProjectJSON() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify({map: mapImage.src, paths: allPaths})], {type: 'application/json'}));
    a.download = `Survey_${Date.now()}.json`; a.click();
}
function importProjectJSON(input) {
    const reader = new FileReader();
    reader.onload = e => {
        const data = JSON.parse(e.target.result);
        allPaths = data.paths || [];
        mapImage = new Image(); mapImage.onload = () => resetView(); mapImage.src = data.map;
    };
    reader.readAsText(input.files[0]);
}
function exportPDF() {
    const oldView = {...view};
    view.scale = Math.min(window.innerWidth / A3_W, window.innerHeight / A3_H);
    view.x = window.innerWidth / 2; view.y = window.innerHeight / 2;
    render();
    setTimeout(() => { window.print(); view = oldView; render(); }, 300);
}

// --- カラーボタン生成 ---
const colors = ['red', 'blue', 'purple', 'green', 'orange', 'black'];
function createColorButtons() {
    const cp = document.getElementById('colorPicker');
    cp.innerHTML = '';
    colors.forEach(c => {
        const b = document.createElement('button');
        b.className = 'color-btn';
        b.style.backgroundColor = c;
        // 現在の色かつペンモードの時にクラスを付与
        if (c === currentColor && mode === 'draw') {
            b.classList.add('selected');
        }
        b.onclick = () => { 
            currentColor = c; 
            setMode('draw'); 
        };
        cp.appendChild(b);
    });
}

function setMode(m) {
    mode = m;
    document.getElementById('btn-draw').classList.toggle('active', m === 'draw');
    document.getElementById('btn-erase').classList.toggle('active', m === 'erase');
    createColorButtons(); // モード切替時に色ボタンの状態を更新
}

function undo() { allPaths.pop(); render(); }
canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = Math.pow(0.999, e.deltaY);
    view.x = e.clientX - (e.clientX - view.x) * factor;
    view.y = e.clientY - (e.clientY - view.y) * factor;
    view.scale *= factor;
    render();
}, { passive: false });

init();
</script>
</body>
</html>
