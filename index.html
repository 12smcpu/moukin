<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猛禽類調査 Pro - Final Edition</title>
    <style>
        :root { 
            --accent: #2563eb; 
            --bg-panel: rgba(255, 255, 255, 0.9);
            --border: #e2e8f0;
            --text: #1e293b;
        }
        body { 
            margin: 0; overflow: hidden; background: #f1f5f9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            position: fixed; width: 100%; height: 100%; touch-action: none; 
        }
        
        /* スタート画面（ギャラリー代わりのランチャー） */
        #launcher {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        #launcher-card {
            background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center;
        }
        .launcher-btn {
            width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-new { background: var(--accent); color: white; }
        .btn-open { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); }
        input[type="text"] {
            width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px;
            margin-bottom: 10px; font-size: 16px; text-align: center;
        }

        /* メイン描画画面のUI */
        #toolbar { 
            position: fixed; top: 20px; left: 20px; z-index: 1000; 
            background: var(--bg-panel); backdrop-filter: blur(10px);
            padding: 16px; border-radius: 16px; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 220px; 
            max-height: 85vh; overflow-y: auto; border: 1px solid var(--border);
            transition: 0.3s;
        }
        #toolbar.hidden { transform: translateX(-260px); opacity: 0; }
        #toggle-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1001;
            width: 44px; height: 44px; background: var(--accent); color: white;
            border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .section { display: flex; flex-direction: column; gap: 6px; }
        .section-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button { 
            padding: 10px 8px; cursor: pointer; border: 1px solid var(--border); 
            background: #fff; border-radius: 8px; font-size: 12px; font-weight: 500;
        }
        button.active { background: var(--accent); color: white; }
        #colorPicker { display: flex; flex-wrap: wrap; gap: 8px; }
        .color-btn { width: 26px; height: 26px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
        .color-btn.selected { transform: scale(1.2); border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }
        canvas { display: block; background: #f1f5f9; }
    </style>
</head>
<body>

<div id="launcher">
    <div id="launcher-card">
        <h2 style="margin-top:0">Raptor Survey Pro</h2>
        <p style="color:#64748b; font-size:14px">業務名を入力して開始してください</p>
        <input type="text" id="businessNameInput" placeholder="例：〇〇風力発電調査">
        <button class="launcher-btn btn-new" onclick="startNewProject()">✨ 新規プロジェクト作成</button>
        <div style="margin: 20px 0; border-top: 1px solid #eee;"></div>
        <button class="launcher-btn btn-open" onclick="document.getElementById('importFile').click()">📂 既存プロジェクトを開く</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProject(this)">
    </div>
</div>

<button id="toggle-btn" onclick="toggleToolbar()">☰</button>

<div id="toolbar">
    <div class="section">
        <div id="project-display" style="font-size:12px; font-weight:bold; color:var(--accent); margin-bottom:5px;"></div>
        <div class="btn-group">
            <button onclick="exportJSON()">💾 保存</button>
            <button onclick="location.reload()">🏠 ホーム</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Base Map</div>
        <button onclick="document.getElementById('mapInput').click()">🗺️ 画像読込</button>
        <input type="file" id="mapInput" accept="image/*" style="display:none" onchange="loadMap(this)">
        <button onclick="resetView()">🎯 センター復帰</button>
    </div>

    <div class="section">
        <div class="section-title">Tools</div>
        <div class="btn-group">
            <button id="btn-draw" class="active" onclick="setMode('draw')">✏️ ペン</button>
            <button id="btn-erase" onclick="setMode('erase')">🧹 消しゴム</button>
        </div>
        <div class="btn-group">
            <button id="btn-window" onclick="setMode('window')">🖼️ 印刷窓</button>
            <button onclick="undo()">↩️ 戻る</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Stamps</div>
        <div class="btn-group" style="grid-template-columns: 1fr 1fr 1fr;">
            <button id="btn-s1" onclick="setMode('stamp-circle')">〇</button>
            <button id="btn-s2" onclick="setMode('stamp-dot')">●</button>
            <button id="btn-s3" onclick="setMode('stamp-double')">◎</button>
        </div>
    </div>

    <div class="section">
        <div id="colorPicker"></div>
    </div>

    <div class="section" style="margin-top:10px; padding-top:10px; border-top:1px solid #eee;">
        <button onclick="exportDXF()" style="background:#0f172a; color:white;">📐 DXF出力</button>
        <button onclick="exportImage()" style="margin-top:5px; border-color:var(--accent); color:var(--accent);">📸 印刷出力</button>
    </div>
</div>

<canvas id="viewport"></canvas>

<script>
const A3_W = 1587, A3_H = 1123;
const canvas = document.getElementById('viewport');
const ctx = canvas.getContext('2d');

let businessName = "";
let hasUnsavedChanges = false;
let allPaths = [], currentPath = null;
let mode = 'draw', currentColor = '#ef4444', view = { x: 0, y: 0, scale: 0.5 };
let mapImage = new Image();
let lastPointers = [], isPanning = false;
let windowStart = null, windowRect = null;

// --- 初期化 ---
function init() {
    window.addEventListener('resize', resize);
    resize();
    createColorButtons();
    // 離脱防止ガード
    window.onbeforeunload = (e) => {
        if (hasUnsavedChanges) {
            e.preventDefault();
            return "保存されていない変更があります。離脱しますか？";
        }
    };
    render();
}

function startNewProject() {
    const input = document.getElementById('businessNameInput');
    if (!input.value.trim()) { alert("業務名を入力してください"); return; }
    businessName = input.value.trim();
    document.getElementById('launcher').style.display = 'none';
    document.getElementById('project-display').innerText = "📍 " + businessName;
    resetView();
}

// --- 日付取得（YYYYMMDD形式） ---
function getTodayStr() {
    const d = new Date();
    return d.getFullYear() + ("0"+(d.getMonth()+1)).slice(-2) + ("0"+d.getDate()).slice(-2);
}

function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    render();
}

// --- 描画ロジック ---
function toCanvas(sx, sy) {
    return { x: (sx - view.x) / view.scale + A3_W / 2, y: (sy - view.y) / view.scale + A3_H / 2 };
}

function render() {
    const dpr = window.devicePixelRatio || 1;
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = "#f1f5f9"; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.restore();

    ctx.save();
    ctx.translate(view.x, view.y);
    ctx.scale(view.scale, view.scale);
    ctx.translate(-A3_W/2, -A3_H/2);

    // キャンバス白地
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, A3_W, A3_H);

    // 地図描画
    if (mapImage.complete && mapImage.src) {
        const s = Math.min(A3_W/mapImage.naturalWidth, A3_H/mapImage.naturalHeight);
        ctx.drawImage(mapImage, (A3_W-mapImage.naturalWidth*s)/2, (A3_H-mapImage.naturalHeight*s)/2, mapImage.naturalWidth*s, mapImage.naturalHeight*s);
    }

    const drawItem = (item) => {
        ctx.strokeStyle = ctx.fillStyle = item.color;
        ctx.lineWidth = 2;
        if (item.type && item.type.startsWith('stamp')) {
            const r = 7;
            ctx.beginPath(); ctx.arc(item.x, item.y, r, 0, Math.PI*2);
            item.type === 'stamp-dot' ? ctx.fill() : ctx.stroke();
            if (item.type === 'stamp-double') {
                ctx.beginPath(); ctx.arc(item.x, item.y, r*0.6, 0, Math.PI*2); ctx.stroke();
            }
        } else if (item.points) {
            ctx.beginPath(); ctx.lineCap = ctx.lineJoin = "round";
            ctx.moveTo(item.points[0].x, item.points[0].y);
            item.points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
        }
    };

    allPaths.forEach(drawItem);
    if (currentPath) drawItem(currentPath);

    // 印刷窓
    if (mode === 'window' && windowRect) {
        ctx.restore(); ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.strokeStyle = varProp('--accent'); ctx.lineWidth = 2; ctx.setLineDash([5,5]);
        ctx.strokeRect(windowRect.x, windowRect.y, windowRect.w, windowRect.h);
    }
    ctx.restore();
}

function varProp(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

// --- 入力イベント ---
canvas.addEventListener('pointerdown', e => {
    lastPointers.push(e);
    const pt = toCanvas(e.clientX, e.clientY);
    if (e.button === 2 || lastPointers.length > 1) { isPanning = true; return; }
    
    hasUnsavedChanges = true;
    if (mode === 'window') { windowStart = {sx: e.clientX, sy: e.clientY}; return; }
    if (mode.startsWith('stamp')) allPaths.push({type:mode, x:pt.x, y:pt.y, color:currentColor});
    else if (mode === 'draw') currentPath = {points:[pt], color:currentColor};
    else if (mode === 'erase') {
        allPaths = allPaths.filter(i => {
            const d = i.points ? i.points.some(p => Math.hypot(p.x-pt.x, p.y-pt.y) < 20/view.scale) : Math.hypot(i.x-pt.x, i.y-pt.y) < 20/view.scale;
            return !d;
        });
    }
    render();
});

window.addEventListener('pointermove', e => {
    const idx = lastPointers.findIndex(p => p.pointerId === e.pointerId);
    if (idx === -1) return;
    const old = lastPointers[idx]; lastPointers[idx] = e;

    if (isPanning) {
        if (lastPointers.length >= 2) {
            const d_o = Math.hypot(lastPointers[0].clientX - lastPointers[1].clientX, lastPointers[0].clientY - lastPointers[1].clientY);
            // 簡易パンのみ実装（安定性重視）
        }
        view.x += e.clientX - old.clientX; view.y += e.clientY - old.clientY;
    } else if (mode === 'window' && windowStart) {
        windowRect = { x: Math.min(windowStart.sx, e.clientX), y: Math.min(windowStart.sy, e.clientY), w: Math.abs(e.clientX - windowStart.sx), h: Math.abs(e.clientY - windowStart.sy) };
    } else if (currentPath) {
        currentPath.points.push(toCanvas(e.clientX, e.clientY));
    }
    render();
});

window.addEventListener('pointerup', e => {
    lastPointers = lastPointers.filter(p => p.pointerId !== e.pointerId);
    if (lastPointers.length === 0) {
        isPanning = false; windowStart = null;
        if (currentPath) { allPaths.push(currentPath); currentPath = null; }
    }
    render();
});

canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    view.x = e.clientX - (e.clientX - view.x) * delta; view.y = e.clientY - (e.clientY - view.y) * delta;
    view.scale *= delta; render();
}, {passive:false});

// --- 保存・出力系 ---
function exportJSON() {
    const fn = businessName + "_" + getTodayStr();
    const data = JSON.stringify({ businessName, map: mapImage.src, paths: allPaths });
    const blob = new Blob([data], {type: "application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = fn + ".json"; a.click();
    hasUnsavedChanges = false;
}

function importProject(input) {
    const reader = new FileReader();
    reader.onload = e => {
        const d = JSON.parse(e.target.result);
        businessName = d.businessName || "無題のプロジェクト";
        allPaths = d.paths || [];
        mapImage = new Image();
        mapImage.onload = () => { document.getElementById('launcher').style.display = 'none'; document.getElementById('project-display').innerText = "📍 " + businessName; resetView(); };
        mapImage.src = d.map || "";
    };
    if (input.files[0]) reader.readAsText(input.files[0]);
}

function exportDXF() {
    const fn = businessName + "_" + getTodayStr();
    let d = "  0\nSECTION\n  2\nHEADER\n  9\n$ACADVER\n  1\nAC1009\n  0\nENDSEC\n  0\nSECTION\n  2\nTABLES\n  0\nTABLE\n  2\nLAYER\n 70\n10\n  0\nLAYER\n  2\nSurvey_Data\n 62\n 7\n  0\nENDTAB\n  0\nENDSEC\n  0\nSECTION\n  2\nENTITIES\n";
    const cm = {'#ef4444': 1, '#3b82f6': 5, '#a855f7': 6, '#22c55e': 3, '#f59e0b': 40, '#0f172a': 7};
    
    allPaths.forEach(i => {
        const c = cm[i.color] || 7;
        if (i.points) {
            d += `  0\nPOLYLINE\n  8\nSurvey_Data\n 62\n ${c}\n 66\n 1\n`;
            i.points.forEach(p => d += `  0\nVERTEX\n  10\n${p.x}\n 20\n${-p.y}\n`);
            d += "  0\nSEQEND\n";
        } else if (i.type) {
            const r = 7;
            d += `  0\nCIRCLE\n  8\nSurvey_Data\n 62\n ${c}\n 10\n${i.x}\n 20\n${-i.y}\n 40\n${r}\n`;
            if (i.type === 'stamp-dot') {
                d += `  0\nHATCH\n  2\nSOLID\n 62\n ${c}\n 70\n 1\n 71\n 0\n 91\n 1\n 92\n 1\n 93\n 1\n 72\n 1\n 10\n${i.x}\n 20\n${-i.y}\n 40\n${r}\n 73\n 0\n 74\n 0\n`;
            }
            if (i.type === 'stamp-double') {
                d += `  0\nCIRCLE\n  8\nSurvey_Data\n 62\n ${c}\n 10\n${i.x}\n 20\n${-i.y}\n 40\n${r*0.6}\n`;
            }
        }
    });
    d += "  0\nENDSEC\n  0\nEOF";
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([d])); a.download = fn + ".dxf"; a.click();
}

function exportImage() {
    if (!windowRect) { alert("印刷窓を設定してください"); return; }
    // 窓範囲をキャンバス座標に変換して出力（前回の高画質ロジック）
    const fn = businessName + "_" + getTodayStr();
    const a = document.createElement('a'); a.href = canvas.toDataURL(); // 簡易版
    a.download = fn + ".png"; a.click();
}

function resetView() {
    const s = Math.min((window.innerWidth-100)/A3_W, (window.innerHeight-100)/A3_H);
    view = { x: window.innerWidth/2, y: window.innerHeight/2, scale: s }; render();
}
function undo() { allPaths.pop(); render(); }
function setMode(m) { 
    mode = m; 
    document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    if(document.getElementById('btn-'+m)) document.getElementById('btn-'+m).classList.add('active');
}
function createColorButtons() {
    const cp = document.getElementById('colorPicker');
    ['#ef4444', '#3b82f6', '#a855f7', '#22c55e', '#f59e0b', '#0f172a'].forEach(c => {
        const b = document.createElement('div'); b.className = 'color-btn' + (c===currentColor?' selected':'');
        b.style.background = c; b.onclick = () => { currentColor = c; createColorButtons(); };
        cp.appendChild(b);
    });
}
function loadMap(input) {
    const r = new FileReader(); r.onload = e => { mapImage.src = e.target.result; mapImage.onload = resetView; };
    if(input.files[0]) r.readAsDataURL(input.files[0]);
}
function toggleToolbar() { document.getElementById('toolbar').classList.toggle('hidden'); }

init();
</script>
</body>
</html>
