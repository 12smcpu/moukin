<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猛禽類調査 Pro - Custom</title>
    <style>
        :root { --accent: #3498db; }
        body { margin: 0; overflow: hidden; background: #dadce3; font-family: sans-serif; position: fixed; width: 100%; height: 100%; touch-action: none; }
        
        /* ツールバーのレイアウト調整 */
        #toolbar { 
            position: fixed; top: 10px; left: 10px; z-index: 1000; background: rgba(255,255,255,0.95); 
            padding: 10px; border-radius: 12px; display: flex; flex-direction: column; gap: 6px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 200px; /* 一列に並ぶよう幅広に設定 */
            max-height: 90vh; overflow-y: auto;
            transition: transform 0.3s ease;
        }
        #toolbar.hidden { transform: translateX(-230px); }

        #toggle-btn {
            position: fixed; top: 10px; left: 10px; z-index: 1001;
            width: 35px; height: 35px; background: var(--accent); color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: 18px;
        }

        .section-title { font-size: 10px; font-weight: bold; border-left: 3px solid var(--accent); padding-left: 5px; margin-top: 5px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 4px; }
        
        button { padding: 8px 4px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 6px; font-size: 11px; flex: 1; min-width: 40px; }
        button.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        /* カラーボタンのUI整理 */
        .color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; flex: none; cursor: pointer; box-sizing: border-box; }
        .color-btn.selected { border: 2px solid #fff; box-shadow: 0 0 0 2px var(--accent); transform: scale(1.1); }

        canvas { display: block; background: transparent; cursor: crosshair; }

        @media print {
            #toolbar, #toggle-btn { display: none !important; }
            body { background: white !important; position: static !important; }
            @page { margin: 0; size: A3 landscape; }
        }
    </style>
</head>
<body>

<button id="toggle-btn" onclick="toggleToolbar()">≡</button>

<div id="toolbar">
    <div class="section-title">FILE</div>
    <div class="btn-group">
        <button onclick="exportProjectJSON()">保存</button>
        <button onclick="document.getElementById('importFile').click()">開く</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProjectJSON(this)">

    <div class="section-title">MAP</div>
    <input type="file" id="mapInput" accept="image/*" style="font-size: 9px; width: 100%;">
    <button onclick="resetView()">全体表示</button>

    <div class="section-title">TOOLS</div>
    <div class="btn-group">
        <button id="btn-draw" class="active" onclick="setMode('draw')">ペン</button>
        <button id="btn-erase" onclick="setMode('erase')">消去</button>
        <button id="btn-window" onclick="setMode('window')">窓(印刷)</button>
        <button onclick="undo()">Undo</button>
    </div>

    <div class="section-title">STAMPS</div>
    <div class="btn-group">
        <button id="btn-s1" onclick="setMode('stamp-circle')">〇</button>
        <button id="btn-s2" onclick="setMode('stamp-dot')">●</button>
        <button id="btn-s3" onclick="setMode('stamp-double')">◎</button>
    </div>

    <div id="colorPicker" class="btn-group"></div>

    <div class="section-title">EXPORT</div>
    <div class="btn-group">
        <button onclick="exportDXF()">DXF</button>
        <button onclick="exportPDFWithWindow()" style="color:var(--accent);">PDF出力</button>
    </div>
</div>

<canvas id="viewport"></canvas>

<script>
const A3_W = 1587, A3_H = 1123;
const canvas = document.getElementById('viewport');
const ctx = canvas.getContext('2d');
let mapImage = new Image(), allPaths = [], currentPath = null;
let mode = 'draw', currentColor = 'red', view = { x: 0, y: 0, scale: 0.5 };
let lastPointers = [], isPanning = false;
let windowStart = null, windowRect = null;

function init() {
    window.addEventListener('resize', resize);
    resize();
    view.x = window.innerWidth / 2;
    view.y = window.innerHeight / 2;
    createColorButtons();
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    render();
}

function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
    render();
}

function toCanvas(sx, sy) {
    return { 
        x: (sx - view.x) / view.scale + A3_W / 2, 
        y: (sy - view.y) / view.scale + A3_H / 2 
    };
}

function render() {
    const dpr = window.devicePixelRatio || 1;
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = "#dadce3"; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.restore();

    ctx.save();
    ctx.translate(view.x, view.y);
    ctx.scale(view.scale, view.scale);
    ctx.translate(-A3_W/2, -A3_H/2);

    // 紙とクリッピング
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, A3_W, A3_H);
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, A3_W, A3_H); ctx.clip();

    if (mapImage.complete && mapImage.naturalWidth > 0) {
        const s = Math.min(A3_W/mapImage.naturalWidth, A3_H/mapImage.naturalHeight);
        ctx.drawImage(mapImage, (A3_W-mapImage.naturalWidth*s)/2, (A3_H-mapImage.naturalHeight*s)/2, mapImage.naturalWidth*s, mapImage.naturalHeight*s);
    }

    const drawItem = (item) => {
        if (!item) return;
        ctx.strokeStyle = ctx.fillStyle = item.color;
        ctx.lineWidth = 1; // 修正後の太さ
        if (item.type && item.type.startsWith('stamp')) {
            const r = 7; // 修正後の半径
            ctx.beginPath(); ctx.arc(item.x, item.y, r, 0, Math.PI*2);
            item.type === 'stamp-dot' ? ctx.fill() : ctx.stroke();
            if (item.type === 'stamp-double') {
                ctx.beginPath(); ctx.arc(item.x, item.y, r*0.6, 0, Math.PI*2); ctx.stroke();
            }
        } else if (item.points) {
            ctx.beginPath(); ctx.lineCap = ctx.lineJoin = "round";
            ctx.moveTo(item.points[0].x, item.points[0].y);
            item.points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
        }
    };

    allPaths.forEach(drawItem);
    if (currentPath) drawItem(currentPath);
    ctx.restore(); // クリップ終了

    // 窓のプレビュー
    if (mode === 'window' && windowRect) {
        ctx.strokeStyle = "rgba(52, 152, 219, 0.8)";
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(windowRect.x, windowRect.y, windowRect.w, windowRect.h);
        ctx.setLineDash([]);
    }
    ctx.restore();
}

canvas.addEventListener('pointerdown', e => {
    lastPointers.push(e);
    const pt = toCanvas(e.clientX, e.clientY);

    if (e.button === 2 || lastPointers.length > 1) {
        isPanning = true; return;
    }
    
    if (mode === 'window') {
        windowStart = pt; return;
    }

    if (pt.x < 0 || pt.x > A3_W || pt.y < 0 || pt.y > A3_H) return;

    if (mode.startsWith('stamp')) {
        allPaths.push({type: mode, x: pt.x, y: pt.y, color: currentColor});
        render();
    } else if (mode === 'draw') {
        currentPath = {points: [pt], color: currentColor};
    } else if (mode === 'erase') {
        allPaths = allPaths.filter(i => {
            const dist = i.points ? i.points.some(p => Math.hypot(p.x-pt.x, p.y-pt.y) < 20/view.scale) : Math.hypot(i.x-pt.x, i.y-pt.y) < 20/view.scale;
            return !dist;
        });
        render();
    }
});

window.addEventListener('pointermove', e => {
    const idx = lastPointers.findIndex(p => p.pointerId === e.pointerId);
    if (idx === -1) return;
    const pt = toCanvas(e.clientX, e.clientY);

    if (isPanning) {
        if (lastPointers.length > 1) {
            const p1 = lastPointers[0], p2 = lastPointers[1];
            const oldD = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
            lastPointers[idx] = e;
            const newD = Math.hypot(lastPointers[0].clientX - lastPointers[1].clientX, lastPointers[0].clientY - lastPointers[1].clientY);
            if (oldD > 0) view.scale *= (newD / oldD);
        }
        view.x += e.clientX - lastPointers[idx].clientX;
        view.y += e.clientY - lastPointers[idx].clientY;
    } else if (mode === 'window' && windowStart) {
        windowRect = { x: Math.min(windowStart.x, pt.x), y: Math.min(windowStart.y, pt.y), w: Math.abs(pt.x - windowStart.x), h: Math.abs(pt.y - windowStart.y) };
    } else if (currentPath) {
        currentPath.points.push(pt);
    }
    lastPointers[idx] = e;
    render();
});

window.addEventListener('pointerup', e => {
    lastPointers = lastPointers.filter(p => p.pointerId !== e.pointerId);
    if (lastPointers.length === 0) {
        isPanning = false; windowStart = null;
        if (currentPath) { allPaths.push(currentPath); currentPath = null; }
    }
    render();
});

canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    view.x = e.clientX - (e.clientX - view.x) * delta;
    view.y = e.clientY - (e.clientY - view.y) * delta;
    view.scale *= delta;
    render();
}, { passive: false });

function toggleToolbar() { document.getElementById('toolbar').classList.toggle('hidden'); }

function setMode(m) { 
    mode = m; 
    const btns = {draw:'btn-draw', erase:'btn-erase', 'stamp-circle':'btn-s1', 'stamp-dot':'btn-s2', 'stamp-double':'btn-s3', 'window':'btn-window'};
    Object.values(btns).forEach(id => { if(document.getElementById(id)) document.getElementById(id).className = ''; });
    if(btns[m]) document.getElementById(btns[m]).className = 'active';
}

function createColorButtons() {
    const cp = document.getElementById('colorPicker'); cp.innerHTML = '';
    ['red', 'blue', 'purple', 'green', 'orange', 'black'].forEach(c => {
        const b = document.createElement('div'); b.className = 'color-btn' + (c === currentColor ? ' selected' : '');
        b.style.background = c; b.onclick = () => { currentColor = c; createColorButtons(); if(mode==='erase') setMode('draw'); };
        cp.appendChild(b);
    });
}

function resetView() {
    const s = Math.min((window.innerWidth-100)/A3_W, (window.innerHeight-100)/A3_H);
    view = { x: window.innerWidth/2, y: window.innerHeight/2, scale: s };
    render();
}

function askFilename(def) { const n = prompt("ファイル名を入力してください", def); return n ? n : def; }

function exportDXF() {
    const fn = askFilename("survey");
    let d = "0\nSECTION\n2\nENTITIES\n";
    const cm = {red:1, blue:5, purple:6, green:3, orange:40, black:7};
    allPaths.forEach(i => {
        const c = cm[i.color]||7;
        if (i.points) {
            d += `0\nPOLYLINE\n8\nSurvey\n62\n${c}\n66\n1\n40\n1.0\n41\n1.0\n`;
            i.points.forEach(p => d += `0\nVERTEX\n8\nSurvey\n10\n${p.x}\n20\n${-p.y}\n`);
            d += "0\nSEQEND\n";
        } else {
            d += `0\nCIRCLE\n8\nSurvey\n62\n${c}\n10\n${i.x}\n20\n${-i.y}\n40\n7.0\n`;
        }
    });
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([d+"0\nENDSEC\n0\nEOF"], {type:"application/dxf"}));
    a.download = fn + ".dxf"; a.click();
}
function undo() {
    if (allPaths.length > 0) {
        allPaths.pop(); // 最後の描画データを取り除く
        render();       // 画面を再描画して反映させる
    }
}
function exportPDFWithWindow() {
    if (!windowRect || windowRect.w < 5 || windowRect.h < 5) {
        alert("窓で範囲を囲ってください");
        return;
    }

    // 1. 印刷用の倍率と位置を計算（ここは今まで通り）
    const A3_RATIO = 1587 / 1123;
    let targetW = windowRect.w, targetH = windowRect.h;
    if (targetW / targetH > A3_RATIO) targetH = targetW / A3_RATIO;
    else targetW = targetH * A3_RATIO;

    const sc = Math.min(window.innerWidth / targetW, window.innerHeight / targetH);
    
    // 状態を一時保存
    const oldView = { ...view };
    
    // 座標をセット
    view.scale = sc;
    view.x = (1587 / 2 - (windowRect.x + (windowRect.w - targetW) / 2)) * sc;
    view.y = (1123 / 2 - (windowRect.y + (windowRect.h - targetH) / 2)) * sc;

    // 2. 【ここが重要】「白い塗りつぶし」を物理的にさせない設定
    // 印刷の瞬間だけ、canvas自体の背景を白くし、render内の「紙」描画を無効化する
    const canvasEl = document.getElementById('viewport');
    canvasEl.style.backgroundColor = "white"; // canvasの裏地を白くする

    // 一旦クリアして再描画
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    render(); 

    // 3. 印刷
    setTimeout(() => {
        window.print();
        
        // 終わったら元に戻す
        view = oldView;
        canvasEl.style.backgroundColor = "#dadce3";
        render();
    }, 500);
}
function exportProjectJSON() {
    const fn = askFilename("project");
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({map:mapImage.src, paths:allPaths})], {type:"application/json"}));
    a.download = fn + ".json"; a.click();
}

function importProjectJSON(i) {
    const r = new FileReader(); r.onload = e => {
        const d = JSON.parse(e.target.result); allPaths = d.paths || [];
        mapImage = new Image(); mapImage.onload = () => { resetView(); render(); }; mapImage.src = d.map || "";
    };
    if(i.files[0]) r.readAsText(i.files[0]);
}

document.getElementById('mapInput').onchange = e => {
    const r = new FileReader();
    r.onload = f => { mapImage = new Image(); mapImage.onload = resetView; mapImage.src = f.target.result; };
    if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
};

init();
</script>
</body>
</html>
